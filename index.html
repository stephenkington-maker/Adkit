// ─── HELPERS ──────────────────────────────────────────────────────────────────
function easeOut(t){return 1-Math.pow(1-t,3)}
function easeMid(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function bounceOut(t){if(t<1/2.75)return 7.5625*t*t;if(t<2/2.75){t-=1.5/2.75;return 7.5625*t*t+0.75}if(t<2.5/2.75){t-=2.25/2.75;return 7.5625*t*t+0.9375}t-=2.625/2.75;return 7.5625*t*t+0.984375}
function readFile(file){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(file)})}
function loadImg(src){return new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.src=src})}
function ff(f){return`'${f}',sans-serif`}

// ─── EXPORT HOOK ──────────────────────────────────────────────────────────────
function useExport(renderFn,totalFrames,filename){
  const[prog,setProg]=useState(0);
  const[exporting,setExporting]=useState(false);
  const[blob,setBlob]=useState(null);
  const canvasRef=useRef(null);
  const run=useCallback(async(w,h)=>{
    setExporting(true);setProg(0);setBlob(null);
    if(!canvasRef.current)canvasRef.current=document.createElement("canvas");
    const canvas=canvasRef.current;canvas.width=w;canvas.height=h;
    const stream=canvas.captureStream(FPS);
    const rec=new MediaRecorder(stream,{mimeType:"video/webm",videoBitsPerSecond:8000000});
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data?.size>0)chunks.push(e.data)};
    rec.onstop=()=>{setBlob(new Blob(chunks,{type:"video/webm"}));setExporting(false);setProg(100)};
    rec.start();let f=0;
    await new Promise(res=>{
      const iv=setInterval(()=>{
        if(f>=totalFrames){clearInterval(iv);rec.requestData();setTimeout(()=>{rec.stop();res()},200);return}
        renderFn(canvas,f);rec.requestData();f++;setProg(Math.round((f/totalFrames)*100));
      },1000/FPS);
    });
  },[renderFn,totalFrames]);
  const download=useCallback(()=>{
    if(!blob)return;
    const u=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=u;a.download=filename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(u),2000);
  },[blob,filename]);
  return{run,download,prog,exporting,blob,setBlob};
}

// ─── APP: FLICK ───────────────────────────────────────────────────────────────
function FlickApp(){
  const[logo,setLogo]=useState(null);
  const[bgs,setBgs]=useState([]);
  const[ratio,setRatio]=useState("9x16");
  const[loops,setLoops]=useState(1);
  const[audio,setAudio]=useState(null);
  const[playing,setPlaying]=useState(false);
  const[curBg,setCurBg]=useState(0);
  const[logoScale,setLogoScale]=useState(55);
  const[lx,setLx]=useState(50);
  const[ly,setLy]=useState(50);
  const[editMode,setEditMode]=useState(false);
  const[overlayMode,setOverlayMode]=useState("logo");
  const[textLine,setTextLine]=useState("YOUR BRAND");
  const[textFont,setTextFont]=useState("Inter");
  const[textColor,setTextColor]=useState("#ffffff");
  const[textSize,setTextSize]=useState(60);

  const prevRef=useRef(null);
  const wrapRef=useRef(null);
  const logoRef=useRef(null);
  const bgRefs=useRef([]);
  const animRef=useRef(null);
  const startRef=useRef(null);
  const bgIdxRef=useRef(0);
  const posRef=useRef({x:50,y:50,s:55});
  const dragRef=useRef({active:false,startX:0,startY:0,startLx:50,startLy:50});
  const pinchRef=useRef({active:false,startDist:0,startScale:55});
  // keep latest values accessible in event handlers without stale closure
  const overlayRef=useRef({mode:"logo",text:"YOUR BRAND",font:"Inter",color:"#ffffff",size:60});

  const R=RATIOS.find(r=>r.key===ratio);

  useEffect(()=>{posRef.current={x:lx,y:ly,s:logoScale}},[lx,ly,logoScale]);
  useEffect(()=>{overlayRef.current={mode:overlayMode,text:textLine,font:textFont,color:textColor,size:textSize}},[overlayMode,textLine,textFont,textColor,textSize]);
  useEffect(()=>{if(!logo){logoRef.current=null;return}loadImg(logo).then(i=>logoRef.current=i)},[logo]);
  useEffect(()=>{bgRefs.current=new Array(bgs.length).fill(null);bgs.forEach((src,i)=>loadImg(src).then(im=>bgRefs.current[i]=im))},[bgs]);

  const drawFrame=useCallback((canvas,bgIdx,showGuide)=>{
    const ctx=canvas.getContext("2d");
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    const bg=bgRefs.current[bgIdx];
    if(bg){const s=Math.max(W/bg.width,H/bg.height);const sw=bg.width*s,sh=bg.height*s;ctx.drawImage(bg,(W-sw)/2,(H-sh)/2,sw,sh)}
    else{ctx.fillStyle="#111118";ctx.fillRect(0,0,W,H)}
    ctx.globalAlpha=0.22;ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
    const{x,y,s:sc}=posRef.current;
    const ov=overlayRef.current;
    if(ov.mode==="text"&&ov.text){
      const fs=Math.round(W*(ov.size/100)*0.12);
      ctx.font=`900 ${fs}px ${ff(ov.font)}`;
      ctx.fillStyle=ov.color;
      ctx.textAlign="center";ctx.textBaseline="middle";
      const words=ov.text.split(" ");let lines=[],cur="";
      words.forEach(w=>{const t2=cur?cur+" "+w:w;if(ctx.measureText(t2).width>W*0.86&&cur){lines.push(cur);cur=w}else cur=t2});
      if(cur)lines.push(cur);
      const totalH=lines.length*fs*1.3;
      const sy=H*y/100-totalH/2+fs/2;
      lines.forEach((l,i)=>ctx.fillText(l,W*x/100,sy+i*fs*1.3));
      ctx.textAlign="left";ctx.textBaseline="alphabetic";
      if(showGuide){
        ctx.strokeStyle="rgba(124,58,237,0.7)";ctx.lineWidth=2;ctx.setLineDash([6,4]);
        ctx.strokeRect(W*x/100-W*ov.size/100/2,H*y/100-totalH/2-8,W*ov.size/100,totalH+16);
        ctx.setLineDash([]);
      }
    } else {
      const lg=logoRef.current;
      if(lg){
        const mw=W*(sc/100);const sf=Math.min(mw/lg.width,(H*0.8)/lg.height);
        const lw=lg.width*sf,lh=lg.height*sf;
        const lx_=W*x/100-lw/2,ly_=H*y/100-lh/2;
        ctx.drawImage(lg,lx_,ly_,lw,lh);
        if(showGuide){
          ctx.save();
          ctx.strokeStyle="rgba(124,58,237,0.9)";ctx.lineWidth=Math.max(2,W*0.004);
          ctx.setLineDash([W*0.012,W*0.008]);ctx.strokeRect(lx_-4,ly_-4,lw+8,lh+8);ctx.setLineDash([]);
          const hs=Math.max(6,W*0.018);
          [[lx_-4,ly_-4],[lx_+lw+4-hs,ly_-4],[lx_-4,ly_+lh+4-hs],[lx_+lw+4-hs,ly_+lh+4-hs]].forEach(([cx,cy])=>{ctx.fillStyle="rgba(124,58,237,1)";ctx.fillRect(cx,cy,hs,hs)});
          ctx.restore();
        }
      }
    }
  },[]);

  const runPreview=useCallback(()=>{
    const loop=ts=>{
      if(!startRef.current)startRef.current=ts;
      const el=ts-startRef.current;const cnt=Math.max(bgs.length,1);
      const i=Math.floor(el/BG_MS)%cnt;
      if(i!==bgIdxRef.current){bgIdxRef.current=i;setCurBg(i)}
      if(prevRef.current)drawFrame(prevRef.current,i,editMode);
      animRef.current=requestAnimationFrame(loop);
    };
    animRef.current=requestAnimationFrame(loop);
  },[bgs,drawFrame,editMode]);

  useEffect(()=>{
    if(playing){startRef.current=null;bgIdxRef.current=0;runPreview()}
    else{if(animRef.current)cancelAnimationFrame(animRef.current);setTimeout(()=>{if(prevRef.current)drawFrame(prevRef.current,0,editMode)},60)}
    return()=>{if(animRef.current)cancelAnimationFrame(animRef.current)};
  },[playing,runPreview,drawFrame,editMode]);

  useEffect(()=>{
    if(!playing)setTimeout(()=>{if(prevRef.current)drawFrame(prevRef.current,0,editMode)},60);
  },[logo,bgs,logoScale,lx,ly,editMode,overlayMode,textLine,textFont,textColor,textSize,drawFrame,playing]);

  useEffect(()=>{
    const canvas=prevRef.current;const wrap=wrapRef.current;
    if(!canvas||!wrap||!editMode)return;
    const dist=(t1,t2)=>Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
    const onMouseDown=e=>{e.preventDefault();dragRef.current={active:true,startX:e.clientX,startY:e.clientY,startLx:posRef.current.x,startLy:posRef.current.y}};
    const onMouseMove=e=>{
      if(!dragRef.current.active)return;
      const r=canvas.getBoundingClientRect();
      const dx=((e.clientX-dragRef.current.startX)/r.width)*100;
      const dy=((e.clientY-dragRef.current.startY)/r.height)*100;
      const nx=Math.max(0,Math.min(100,dragRef.current.startLx+dx));
      const ny=Math.max(0,Math.min(100,dragRef.current.startLy+dy));
      posRef.current={...posRef.current,x:nx,y:ny};setLx(Math.round(nx));setLy(Math.round(ny));
    };
    const onMouseUp=()=>{dragRef.current.active=false};
    const onWheel=e=>{e.preventDefault();const ns=Math.max(5,Math.min(95,posRef.current.s+(e.deltaY>0?-2:2)));posRef.current={...posRef.current,s:ns};setLogoScale(Math.round(ns))};
    const onTouchStart=e=>{
      if(e.touches.length===1){const t=e.touches[0];dragRef.current={active:true,startX:t.clientX,startY:t.clientY,startLx:posRef.current.x,startLy:posRef.current.y};pinchRef.current.active=false}

const PROOF_TMPLS=[{k:"dark",bg:"#0a0a0f",fg:"#f0f0f8",sub:"#9ca3af"},{k:"light",bg:"#f8f8fc",fg:"#111118",sub:"#6b7280"},{k:"brand",bg:"#0f172a",fg:"#e2e8f0",sub:"#94a3b8"}];

function parseParts(text){
  const parts=[];const re=/\*\*(.+?)\*\*/g;let last=0,m;
  while((m=re.exec(text))!==null){if(m.index>last)parts.push({t:text.slice(last,m.index),h:false});parts.push({t:m[1],h:true});last=m.index+m[0].length}
  if(last<text.length)parts.push({t:text.slice(last),h:false});
  return parts.length?parts:[{t:text,h:false}];
}

function drawProof(canvas,items,frame,tmplKey,fontFam,fontColor){
  const ctx=canvas.getContext("2d");const{width:W,height:H}=canvas;
  const tm=PROOF_TMPLS.find(t=>t.k===tmplKey)||PROOF_TMPLS[0];
  const fam=ff(fontFam||"Inter");
  ctx.clearRect(0,0,W,H);ctx.fillStyle=tm.bg;ctx.fillRect(0,0,W,H);
  if(!items.length)return;
  const idx=Math.min(Math.floor(frame/SLIDE_FRAMES),items.length-1);
  const sf=frame%SLIDE_FRAMES,pr=sf/SLIDE_FRAMES;
  const fadeIn=Math.min(1,pr*6),fadeOut=pr>0.85?Math.max(0,1-(pr-0.85)/0.15):1;
  const alpha=Math.min(fadeIn,fadeOut),slideY=(1-Math.min(1,pr*4))*28;
  const item=items[idx];
  ctx.globalAlpha=alpha;ctx.save();ctx.translate(0,slideY);
  ctx.font=`bold ${Math.round(W*0.12)}px Georgia,serif`;ctx.fillStyle=fontColor||tm.fg;ctx.globalAlpha=alpha*0.07;ctx.fillText('"',W*0.08,H*0.24);ctx.globalAlpha=alpha;
  const parts=parseParts(item.text);
  const fs=Math.round(W*0.042),lh=fs*1.55,maxW=W*0.82;
  let x=W*0.09,y=H*0.32;
  const tokens=[];parts.forEach(p=>p.t.split(" ").forEach(w=>{if(w)tokens.push({w:w+" ",h:p.h})}));
  let lineT=[],lineW=0;
  const renderLine=(toks,ly)=>{let lx=x;toks.forEach(tok=>{ctx.font=`${tok.h?"800":"600"} ${fs}px ${fam}`;if(tok.h){ctx.fillStyle="#fbbf24";ctx.fillRect(lx-2,ly-fs*0.84,ctx.measureText(tok.w.trimEnd()).width+4,fs*1.08);ctx.fillStyle="#111"}else ctx.fillStyle=fontColor||tm.fg;ctx.fillText(tok.w,lx,ly);lx+=ctx.measureText(tok.w).width})};
  tokens.forEach(tok=>{ctx.font=`${tok.h?"800":"600"} ${fs}px ${fam}`;const w=ctx.measureText(tok.w).width;if(lineW+w>maxW&&lineT.length){renderLine(lineT,y);y+=lh;lineT=[];lineW=0}lineT.push(tok);lineW+=w});
  if(lineT.length)renderLine(lineT,y);y+=lh*1.5;
  const stars=item.stars||5;ctx.font=`${Math.round(W*0.032)}px Arial`;ctx.fillStyle="#fbbf24";ctx.fillText("★".repeat(stars)+"☆".repeat(5-stars),x,y);y+=lh*1.2;
  ctx.font=`700 ${Math.round(fs*0.85)}px ${fam}`;ctx.fillStyle=fontColor||tm.fg;ctx.fillText(`— ${item.author}`,x,y);
  if(item.handle){ctx.font=`500 ${Math.round(fs*0.75)}px ${fam}`;ctx.fillStyle=tm.sub;ctx.fillText(item.handle,x,y+lh*0.9)}
  const dr=Math.round(W*0.018),dotY=H*0.92,dw=items.length*dr*3;let dx=(W-dw)/2;
  items.forEach((_,di)=>{ctx.beginPath();ctx.arc(dx+dr,dotY,di===idx?dr*1.2:dr*0.7,0,Math.PI*2);ctx.fillStyle=di===idx?"#0ea5e9":`${tm.fg}44`;ctx.fill();dx+=dr*3});
  ctx.restore();ctx.globalAlpha=1;
}

  const save=()=>{if(editIdx===null)return;const n=[...items];n[editIdx]={...editBuf};setItems(n);setEditIdx(null);setBlob(null)};
  const IS={width:"100%",padding:"8px 10px",borderRadius:8,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",color:C.text,fontSize:12,outline:"none",marginTop:4};
  const curSlide=Math.floor(curFrame/SLIDE_FRAMES);

  const prevH=Math.round(prevW*PH/PW);

  const proofPreview=(

const HOOK_LIST=[
  {id:"nobody",prefix:"Nobody talks about this…",style:"minimal"},
  {id:"wish",  prefix:"I wish I knew this sooner…",style:"bold"},
  {id:"easiest",prefix:"The easiest way to…",style:"impact"},
  {id:"secret",prefix:"The secret nobody tells you…",style:"minimal"},
  {id:"stop",  prefix:"Stop doing this if you…",style:"bold"},
  {id:"why",   prefix:"This is why you're not…",style:"impact"},
];
const HOOK_STYLES={minimal:{bg:"#0a0a0f",fg:"#f0f0f8",acc:"#f59e0b"},bold:{bg:"#f59e0b",fg:"#0a0a0f",acc:"#0a0a0f"},impact:{bg:"#0f172a",fg:"#f8fafc",acc:"#f59e0b"}};

function drawHook(canvas,hook,name,imgEl,frame,fontFam,fontColor){
  const ctx=canvas.getContext("2d");const{width:W,height:H}=canvas;
  const s=HOOK_STYLES[hook.style]||HOOK_STYLES.minimal;
  const fam=ff(fontFam||"Inter");
  const t=frame/HOOK_FRAMES,eased=easeOut(Math.min(1,t*3));
  ctx.clearRect(0,0,W,H);ctx.fillStyle=s.bg;ctx.fillRect(0,0,W,H);
  if(imgEl){const ih=H*0.48;const sc=Math.max(W/imgEl.width,ih/imgEl.height);const sw=imgEl.width*sc,sh=imgEl.height*sc;ctx.globalAlpha=Math.min(1,t*2);ctx.drawImage(imgEl,(W-sw)/2,0,sw,sh);const g=ctx.createLinearGradient(0,ih*0.4,0,ih);g.addColorStop(0,"transparent");g.addColorStop(1,s.bg);ctx.fillStyle=g;ctx.fillRect(0,0,W,ih);ctx.globalAlpha=1}
  const py=imgEl?H*0.54:H*0.3,ps=Math.round(W*0.045);
  ctx.font=`700 ${ps}px ${fam}`;ctx.fillStyle=s.acc;ctx.globalAlpha=eased;ctx.fillText(hook.prefix,W*0.08,py+(1-eased)*18);
  const bs=Math.round(W*0.058),by=py+ps*2.2;
  ctx.font=`900 ${bs}px ${fam}`;ctx.fillStyle=fontColor||s.fg;
  const words=(name||"Your Product").split(" ");const maxW=W*0.84;let line="",ly=by;
  words.forEach(w=>{const test=line?line+" "+w:w;if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,W*0.08,ly+(1-eased)*28);ly+=bs*1.35;line=w}else line=test});
  if(line)ctx.fillText(line,W*0.08,ly+(1-eased)*28);
  ctx.globalAlpha=1;
  const barA=Math.min(1,Math.max(0,(t-0.5)*4));
  if(barA>0){ctx.globalAlpha=barA;ctx.fillStyle=s.acc;ctx.fillRect(0,H-H*0.1,W,H*0.1);ctx.font=`800 ${Math.round(W*0.045)}px ${fam}`;ctx.fillStyle=s.bg;ctx.textAlign="center";ctx.fillText("Shop Now →",W/2,H-H*0.1+H*0.065);ctx.textAlign="left";ctx.globalAlpha=1}
}

function HookApp(){
  const[name,setName]=useState("");
  const[img,setImg]=useState(null);
  const[sel,setSel]=useState(new Set(["nobody","wish","easiest"]));
  const[actH,setActH]=useState(0);
  const[playing,setPlaying]=useState(false);
  const[hookFont,setHookFont]=useState("Inter");
  const[hookColor,setHookColor]=useState("#f0f0f8");
  const imgRef=useRef(null);const prevRef=useRef(null);const animRef=useRef(null);const startRef=useRef(null);
  const active=HOOK_LIST.filter(h=>sel.has(h.id));
  const total=active.length*HOOK_FRAMES;
  useEffect(()=>{if(!img){imgRef.current=null;return}loadImg(img).then(i=>imgRef.current=i)},[img]);
  const drawPrev=useCallback(f=>{if(!prevRef.current||!active.length)return;const hi=Math.floor(f/HOOK_FRAMES)%active.length;setActH(hi);drawHook(prevRef.current,active[hi],name,imgRef.current,f%HOOK_FRAMES,hookFont,hookColor)},[active,name,hookFont,hookColor]);

const REVEAL_STYLES=[{id:"swipe",label:"Swipe",desc:"Left reveals right"},{id:"split",label:"Split",desc:"Centre out"},{id:"flash",label:"Flash",desc:"White flash cut"},{id:"zoom",label:"Zoom",desc:"Zoom through"}];

function drawReveal(canvas,before,after,style,frame,fontFam,fontColor){
  const ctx=canvas.getContext("2d");const{width:W,height:H}=canvas;
  const fam=ff(fontFam||"Inter");
  ctx.clearRect(0,0,W,H);
  const dImg=(img,clip)=>{if(!img){ctx.fillStyle="#1a1a2e";ctx.fillRect(0,0,W,H);return}const s=Math.max(W/img.width,H/img.height);const sw=img.width*s,sh=img.height*s;if(clip){ctx.save();clip()}ctx.drawImage(img,(W-sw)/2,(H-sh)/2,sw,sh);if(clip)ctx.restore()};
  const label=(text,col)=>{ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,H-80,W,80);ctx.font=`700 ${Math.round(W*0.042)}px ${fam}`;ctx.fillStyle=fontColor||col;ctx.textAlign="center";ctx.fillText(text,W/2,H-38);ctx.textAlign="left"};
  if(frame<REVEAL_HOLD){dImg(before);label("Before","#fff");return}
  const tf=frame-REVEAL_HOLD,rawT=Math.min(1,tf/REVEAL_TRANS),t=easeMid(rawT);
  if(style==="swipe"){dImg(after);ctx.save();ctx.beginPath();ctx.rect(0,0,W*(1-t),H);ctx.clip();dImg(before);ctx.restore();const lx=W*(1-t);ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.stroke();if(rawT<0.8){ctx.fillStyle="rgba(255,255,255,0.9)";ctx.font=`bold ${Math.round(W*0.06)}px Arial`;ctx.textAlign="center";ctx.fillText("→",lx+W*0.04,H/2);ctx.textAlign="left"}}
  else if(style==="split"){dImg(after);const half=W*(1-t)/2;ctx.save();ctx.beginPath();ctx.rect(half,0,W-half*2,H);ctx.clip();dImg(before);ctx.restore();ctx.strokeStyle="#fff";ctx.lineWidth=2;[half,W-half].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()})}
  else if(style==="flash"){rawT<0.5?dImg(before):dImg(after);ctx.globalAlpha=Math.sin(rawT*Math.PI)*1.2;ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);ctx.globalAlpha=1}
  else if(style==="zoom"){dImg(before);if(rawT>0.1){const zt=easeMid(Math.max(0,(rawT-0.1)/0.9));ctx.save();ctx.globalAlpha=Math.min(1,zt*2);ctx.translate(W/2,H/2);ctx.scale(1+zt*0.4,1+zt*0.4);ctx.translate(-W/2,-H/2);dImg(after);ctx.restore()}}
  if(t>0.7){ctx.globalAlpha=(t-0.7)/0.3;label("After","#10b981");ctx.globalAlpha=1}
}

const DROP_PALETTES={urgency:{bg:"#0a0a0f",acc:"#ef4444",txt:"#f8f8fc"},clean:{bg:"#fafafa",acc:"#111118",txt:"#111118"},bold:{bg:"#111118",acc:"#fbbf24",txt:"#f8f8fc"}};

function drawDrop(canvas,imgEl,orig,sale,headline,style,frame,fontFam,fontColor){
  const ctx=canvas.getContext("2d");const{width:W,height:H}=canvas;
  const fam=ff(fontFam||"Inter");
  const t=frame/DROP_FRAMES,p=DROP_PALETTES[style]||DROP_PALETTES.urgency;
  ctx.clearRect(0,0,W,H);ctx.fillStyle=p.bg;ctx.fillRect(0,0,W,H);
  if(imgEl){const ih=H*0.5;const s=Math.max(W/imgEl.width,ih/imgEl.height);const sw=imgEl.width*s,sh=imgEl.height*s;ctx.drawImage(imgEl,(W-sw)/2,0,sw,sh);const g=ctx.createLinearGradient(0,ih*0.4,0,ih);g.addColorStop(0,"transparent");g.addColorStop(1,p.bg);ctx.fillStyle=g;ctx.fillRect(0,0,W,ih+10)}
  const ts_=imgEl?H*0.52:H*0.2,px=W*0.08;let y=ts_;
  const eased=easeOut(Math.min(1,t*4));
  if(headline){ctx.font=`700 ${Math.round(W*0.042)}px ${fam}`;ctx.fillStyle=fontColor||p.txt;ctx.globalAlpha=eased;ctx.fillText(headline,px,y+(1-eased)*18);ctx.globalAlpha=1;y+=Math.round(W*0.042)*1.8}
  const disc=orig&&sale?Math.round((1-Number(sale)/Number(orig))*100):null;
  if(disc&&disc>0){const badgeA=easeOut(Math.min(1,Math.max(0,(t-0.1)*5)));ctx.globalAlpha=badgeA;const bh=Math.round(H*0.065),bw=Math.round(W*0.38);ctx.fillStyle=p.acc;ctx.beginPath();ctx.roundRect(px,y,bw,bh,bh/2);ctx.fill();ctx.font=`900 ${Math.round(bh*0.55)}px ${fam}`;ctx.fillStyle=style==="bold"?p.bg:"#fff";ctx.textAlign="center";ctx.fillText(`${disc}% OFF`,px+bw/2,y+bh*0.69);ctx.textAlign="left";ctx.globalAlpha=1;y+=bh+H*0.04}
  const priceA=easeOut(Math.min(1,Math.max(0,(t-0.2)*4)));ctx.globalAlpha=priceA;
  if(orig){const os=Math.round(W*0.052);ctx.font=`500 ${os}px ${fam}`;ctx.fillStyle=fontColor||p.txt;ctx.globalAlpha=priceA*0.35;ctx.fillText(`$${orig}`,px,y);const ow=ctx.measureText(`$${orig}`).width;ctx.strokeStyle=fontColor||p.txt;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px,y-os*0.3);ctx.lineTo(px+ow,y-os*0.3);ctx.stroke();ctx.globalAlpha=1;y+=os*1.6}
  if(sale){const ss=Math.round(W*0.13);const bp=bounceOut(Math.min(1,Math.max(0,(t-0.25)/0.4)));ctx.globalAlpha=Math.min(1,bp*3);ctx.save();ctx.translate(px,y);ctx.scale(0.7+0.3*bp,0.7+0.3*bp);ctx.font=`900 ${ss}px ${fam}`;ctx.fillStyle=p.acc;ctx.fillText(`$${sale}`,0,0);ctx.restore();ctx.globalAlpha=1;y+=ss*1.3}
  const stripA=easeOut(Math.min(1,Math.max(0,(t-0.6)*5)));
  if(stripA>0){ctx.globalAlpha=stripA;const sy=H*0.86,sh2=H*0.09;ctx.fillStyle=p.acc;ctx.fillRect(0,sy,W,sh2);ctx.font=`900 ${Math.round(sh2*0.42)}px ${fam}`;ctx.fillStyle=style==="bold"?p.bg:"#fff";ctx.textAlign="center";ctx.fillText(style==="urgency"?"⚡ LIMITED TIME OFFER":style==="bold"?"SHOP NOW →":"ORDER TODAY",W/2,sy+sh2*0.65);ctx.textAlign="left";ctx.globalAlpha=1}
}

function drawFlickDemo(canvas,t){

  const COLORS=["#1a0533","#0a1a3a","#0a2a1a","#2a0a0a","#1a1a0a","#0a0a2a"];
  const idx=Math.floor(t/250)%COLORS.length;
  ctx.fillStyle=COLORS[idx];ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=0.22;ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  const lw=W*0.55,lh=H*0.14;const lx=(W-lw)/2,ly=(H-lh)/2;
  ctx.fillStyle="rgba(255,255,255,0.92)";ctx.beginPath();ctx.roundRect(lx,ly,lw,lh,lh*0.25);ctx.fill();

}

function drawProofDemo(canvas,elapsed){
  const ctx=canvas.getContext("2d");const W=canvas.width,H=canvas.height;
  const CYCLE=3000;const t=(elapsed%CYCLE)/CYCLE;
  const reviews=[{q:"This **completely changed** how I work.",a:"Sarah K.",stars:5},{q:"**Best investment** I've made this year.",a:"James T.",stars:5},{q:"Would recommend to **everyone**.",a:"Alex R.",stars:5}];
  const ri=Math.floor(elapsed/CYCLE)%reviews.length;const rev=reviews[ri];
  const fadeIn=Math.min(1,t*5),fadeOut=t>0.8?Math.max(0,1-(t-0.8)/0.2):1;const alpha=Math.min(fadeIn,fadeOut);
  ctx.fillStyle="#0a0a0f";ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=0.06;ctx.fillStyle="#fff";ctx.font=`900 ${Math.round(W*0.28)}px Georgia,serif`;ctx.textAlign="center";ctx.fillText('"',W/2,H*0.38);ctx.textAlign="left";ctx.globalAlpha=alpha;
  const words=rev.q.split(" ");const fs=Math.round(W*0.065);const lh=fs*1.5;
  ctx.textBaseline="top";const renderLine=(txt,ly)=>{let lx=W*0.1;txt.split(" ").forEach(w=>{const clean=w.replace(/\*\*/g,"");const isH=rev.q.indexOf(`**${clean}**`)>-1;const ww=ctx.measureText(clean+" ").width;if(isH){ctx.fillStyle="#fbbf24";ctx.fillRect(lx-2,ly-2,ww+2,fs+4);ctx.fillStyle="#111"}else ctx.fillStyle="rgba(240,240,248,0.95)";ctx.fillText(clean+" ",lx,ly);lx+=ww})};
  ctx.font=`700 ${fs}px Inter,system-ui,sans-serif`;let lines=[],cur="";words.forEach(w=>{const clean=w.replace(/\*\*/g,"");const t2=cur?cur+" "+clean:clean;if(ctx.measureText(t2).width>W*0.8&&cur){lines.push(cur);cur=clean}else cur=t2});if(cur)lines.push(cur);
  lines.forEach((l,i)=>renderLine(l,H*0.32+i*lh));let y=H*0.32+lines.length*lh+lh*0.8;
  ctx.fillStyle="#fbbf24";ctx.font=`${Math.round(W*0.06)}px Arial`;ctx.fillText("★★★★★",W*0.1,y);y+=lh;
  ctx.fillStyle="rgba(200,200,220,0.9)";ctx.font=`600 ${Math.round(W*0.055)}px Inter,system-ui,sans-serif`;ctx.fillText(`— ${rev.a}`,W*0.1,y);
  ctx.textBaseline="alphabetic";ctx.globalAlpha=1;
}

function drawHookDemo(canvas,elapsed){
  const ctx=canvas.getContext("2d");const W=canvas.width,H=canvas.height;
  const CYCLE=2800;const t=(elapsed%CYCLE)/CYCLE;
  const hooks=["Nobody talks\nabout this…","I wish I knew\nthis sooner…","The easiest way\nto grow…"];
  const hi=Math.floor(elapsed/CYCLE)%hooks.length;const eased=Math.min(1,t*4);
  ctx.fillStyle="#0f172a";ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=0.4;ctx.fillStyle="#334155";const bw=W*0.35,bh=H*0.22,bx=(W-bw)/2,by=H*0.15;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.fill();
  ctx.globalAlpha=0.7;ctx.font=`${Math.round(W*0.1)}px Arial`;ctx.textAlign="center";ctx.fillText("📦",W/2,by+bh*0.72);ctx.textAlign="left";ctx.globalAlpha=1;
  const fs=Math.round(W*0.078);ctx.globalAlpha=eased;ctx.fillStyle="#f59e0b";ctx.font=`700 ${fs}px Inter,system-ui,sans-serif`;
  hooks[hi].split("\n").forEach((l,i)=>ctx.fillText(l,W*0.08,H*0.62+i*fs*1.4+(1-eased)*20));
  if(t>0.55){const barA=Math.min(1,(t-0.55)*4);ctx.globalAlpha=barA;ctx.fillStyle="#f59e0b";ctx.fillRect(0,H*0.88,W,H*0.12);ctx.fillStyle="#0f172a";ctx.font=`800 ${Math.round(W*0.065)}px Inter,system-ui,sans-serif`;ctx.textAlign="center";ctx.fillText("Shop Now →",W/2,H*0.88+H*0.075);ctx.textAlign="left"}
  ctx.globalAlpha=1;
}

function drawRevealDemo(canvas,elapsed){
  const ctx=canvas.getContext("2d");const W=canvas.width,H=canvas.height;
  const CYCLE=3200;const t=(elapsed%CYCLE)/CYCLE;const HOLD=0.25;
  const drawBefore=()=>{ctx.fillStyle="#1a1a2a";ctx.fillRect(0,0,W,H);const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.6);g.addColorStop(0,"#2d2d44");g.addColorStop(1,"#0a0a14");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.globalAlpha=0.3;ctx.fillStyle="#4a4a6a";ctx.beginPath();ctx.arc(W/2,H*0.42,W*0.28,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1};
  const drawAfter=()=>{ctx.fillStyle="#0a1a0a";ctx.fillRect(0,0,W,H);const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.6);g.addColorStop(0,"#1a4a1a");g.addColorStop(1,"#050f05");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.globalAlpha=0.5;ctx.fillStyle="#22c55e";ctx.beginPath();ctx.arc(W/2,H*0.42,W*0.28,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1};
  const label=(txt,col)=>{ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,H-H*0.12,W,H*0.12);ctx.fillStyle=col;ctx.font=`700 ${Math.round(W*0.08)}px Inter,system-ui,sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(txt,W/2,H-H*0.06);ctx.textAlign="left";ctx.textBaseline="alphabetic"};
  if(t<HOLD){drawBefore();label("Before","rgba(255,255,255,0.9)");return}
  const raw=Math.min(1,(t-HOLD)/(1-HOLD*2));const ease=raw<0.5?4*raw*raw*raw:1-Math.pow(-2*raw+2,3)/2;
  drawAfter();ctx.save();ctx.beginPath();ctx.rect(0,0,W*(1-ease),H);ctx.clip();drawBefore();ctx.restore();
  const lx=W*(1-ease);ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.strokeStyle="rgba(255,255,255,0.9)";ctx.lineWidth=Math.max(2,W*0.006);ctx.stroke();
  if(ease>0.7){ctx.globalAlpha=(ease-0.7)/0.3;label("After","#10b981");ctx.globalAlpha=1}
}

function drawDropDemo(canvas,elapsed){
  const ctx=canvas.getContext("2d");const W=canvas.width,H=canvas.height;
  const CYCLE=4000;const t=(elapsed%CYCLE)/CYCLE;
  ctx.fillStyle="#0a0a0f";ctx.fillRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,0,H*0.5);g.addColorStop(0,"#1a0a0a");g.addColorStop(1,"#0a0a0f");ctx.fillStyle=g;ctx.fillRect(0,0,W,H*0.5);
  ctx.globalAlpha=0.5;ctx.font=`${Math.round(W*0.14)}px Arial`;ctx.textAlign="center";ctx.fillText("🔥",W/2,H*0.3);ctx.textAlign="left";ctx.globalAlpha=1;
  const px=W*0.1;let y=H*0.5;
  const ea=easeOut(Math.min(1,t*5));ctx.globalAlpha=ea;ctx.fillStyle="rgba(240,240,248,0.9)";ctx.font=`700 ${Math.round(W*0.065)}px Inter,system-ui,sans-serif`;ctx.fillText("Limited Time Deal",px,y+(1-ea)*16);y+=Math.round(W*0.065)*1.9;
  if(t>0.15){const bA=easeOut(Math.min(1,(t-0.15)*5));ctx.globalAlpha=bA;const bh=Math.round(H*0.07),bw=W*0.55;ctx.fillStyle="#ef4444";ctx.beginPath();ctx.roundRect(px,y,bw,bh,bh/2);ctx.fill();ctx.fillStyle="#fff";ctx.font=`900 ${Math.round(bh*0.52)}px Inter,system-ui,sans-serif`;ctx.textAlign="center";ctx.fillText("50% OFF",px+bw/2,y+bh*0.68);ctx.textAlign="left";ctx.globalAlpha=1;y+=bh+H*0.04}
  if(t>0.25){const pA=easeOut(Math.min(1,(t-0.25)*4));ctx.globalAlpha=pA*0.35;const os=Math.round(W*0.07);ctx.fillStyle="#f8f8fc";ctx.font=`500 ${os}px Inter,system-ui,sans-serif`;ctx.fillText("$99",px,y);const ow=ctx.measureText("$99").width;ctx.strokeStyle="#f8f8fc";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px,y-os*0.3);ctx.lineTo(px+ow,y-os*0.3);ctx.stroke();ctx.globalAlpha=1;y+=os*1.7}
  if(t>0.32){const bp=bounceOut(Math.min(1,(t-0.32)/0.35));const ss=Math.round(W*0.18);ctx.globalAlpha=Math.min(1,bp*2);ctx.save();ctx.translate(px,y);ctx.scale(0.5+0.5*bp,0.5+0.5*bp);ctx.fillStyle="#ef4444";ctx.font=`900 ${ss}px Inter,system-ui,sans-serif`;ctx.fillText("$49",0,0);ctx.restore();ctx.globalAlpha=1}
  if(t>0.65){const sA=easeOut(Math.min(1,(t-0.65)*4));ctx.globalAlpha=sA;const sy=H*0.87;ctx.fillStyle="#ef4444";ctx.fillRect(0,sy,W,H-sy);ctx.fillStyle="#fff";ctx.font=`800 ${Math.round((H-sy)*0.38)}px Inter,system-ui,sans-serif`;ctx.textAlign="center";ctx.fillText("⚡ LIMITED TIME",W/2,sy+(H-sy)*0.65);ctx.textAlign="left";ctx.globalAlpha=1}
}

function DemoCanvas({drawFn}){
  const canvasRef=useRef(null);const animRef=useRef(null);const startRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const loop=ts=>{if(!startRef.current)startRef.current=ts;drawFn(canvas,ts-startRef.current);animRef.current=requestAnimationFrame(loop)};
    animRef.current=requestAnimationFrame(loop);
    return()=>{if(animRef.current)cancelAnimationFrame(animRef.current)};
  },[drawFn]);
  return <canvas ref={canvasRef} width={270} height={480} style={{width:"100%",height:"100%",display:"block",borderRadius:"inherit"}}/>;
}

// ─── SPONSOR BANNER ───────────────────────────────────────────────────────────
function SponsorBanner({onOpen}){
  const[hov,setHov]=useState(false);
  return(
    <div style={{width:"100%",flexShrink:0,background:"linear-gradient(90deg,#3b0764 0%,#6d1a8a 25%,#9d1a6a 55%,#c2185b 80%,#e91e8c 100%)",borderTop:"1px solid rgba(124,58,237,0.25)",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
        <div style={{width:6,height:6,borderRadius:"50%",background:"#7c3aed",boxShadow:"0 0 6px #7c3aed",flexShrink:0}}/>
        <span style={{fontSize:11,color:"#6b7280",fontWeight:500,flexShrink:0}}>Sponsorship</span>
        <span style={{fontSize:11,color:"rgba(255,255,255,0.12)",flexShrink:0}}>·</span>
        <span style={{fontSize:11,color:"#9ca3af",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Reach <strong style={{color:"#e8e8f2"}}>performance marketers, founders & agencies</strong> using Flick Suite</span>
      </div>
      <button onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={onOpen} style={{padding:"6px 16px",borderRadius:99,border:"1px solid",borderColor:hov?"rgba(124,58,237,0.8)":"rgba(124,58,237,0.4)",background:hov?"rgba(124,58,237,0.2)":"rgba(124,58,237,0.1)",color:hov?"#c4b5fd":"#a78bfa",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all 0.18s",whiteSpace:"nowrap",flexShrink:0,letterSpacing:"0.03em"}}>
        Advertise here →
      </button>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function Root(){
  const[activeApp,setActiveApp]=useState(null);
  const[contactOpen,setContactOpen]=useState(false);
  const activeAppMeta=APPS.find(a=>a.id===activeApp);
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column"}}>
      <header style={{position:"sticky",top:0,zIndex:100,height:52,display:"flex",alignItems:"center",padding:"0 16px",gap:10,background:"rgba(9,9,16,0.95)",backdropFilter:"blur(16px)",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <button onClick={()=>setActiveApp(null)} style={{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",cursor:"pointer",padding:0}}>
          <div style={{width:28,height:28,borderRadius:7,background:"linear-gradient(135deg,#7c3aed,#ec4899)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,boxShadow:"0 0 12px rgba(124,58,237,0.35)"}}>⚡</div>
          <span style={{fontWeight:900,fontSize:15,letterSpacing:"-0.4px",color:C.text}}>Flick</span>
          <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",background:"rgba(124,58,237,0.14)",color:"#c4b5fd",padding:"2px 7px",borderRadius:99,border:"1px solid rgba(124,58,237,0.22)",textTransform:"uppercase"}}>Suite</span>
        </button>
        {activeApp&&(
          <>
            <span style={{color:"rgba(255,255,255,0.2)",fontSize:13}}>/</span>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:13,color:activeAppMeta?.color}}>{activeAppMeta?.icon}</span>
              <span style={{fontSize:14,fontWeight:800,color:C.text}}>{activeAppMeta?.name}</span>
              <span style={{fontSize:9,fontWeight:700,color:activeAppMeta?.color,opacity:0.7,textTransform:"uppercase",letterSpacing:"0.08em"}}>{activeAppMeta?.tag}</span>
            </div>
            <div style={{flex:1}}/>
            <button onClick={()=>setActiveApp(null)} style={{fontSize:11,color:C.muted,background:"none",border:"none",cursor:"pointer",fontWeight:500}}>← Home</button>
          </>
        )}
        {!activeApp&&<div style={{flex:1}}/>}
      </header>
      {activeApp&&(
        <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,background:"rgba(255,255,255,0.01)",overflowX:"auto",flexShrink:0}}>
          {APPS.map(app=>(
            <button key={app.id} onClick={()=>setActiveApp(app.id)} style={{padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",background:"none",border:"none",borderBottom:activeApp===app.id?`2px solid ${app.color}`:"2px solid transparent",color:activeApp===app.id?app.color:C.muted,transition:"all 0.14s",whiteSpace:"nowrap",flexShrink:0}}>{app.icon} {app.name}</button>
          ))}
        </div>
      )}
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}}>
        {!activeApp?<HomePage onSelect={setActiveApp}/>:(
          <div style={{flex:1,width:"100%",maxWidth:"100%",display:"flex",flexDirection:"column"}}>
            {activeApp==="flick"&&<FlickApp/>}
            {activeApp==="proof"&&<ProofApp/>}
            {activeApp==="hook"&&<HookApp/>}
            {activeApp==="reveal"&&<RevealApp/>}
            {activeApp==="drop"&&<DropApp/>}
          </div>
        )}
      </div>
      <SponsorBanner onOpen={()=>setContactOpen(true)}/>
      <ContactForm open={contactOpen} onClose={()=>setContactOpen(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
