function easeOut(t){return 1-Math.pow(1-t,3)}
function easeMid(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function bounceOut(t){if(t<1/2.75)return 7.5625*t*t;if(t<2/2.75){t-=1.5/2.75;return 7.5625*t*t+0.75}if(t<2.5/2.75){t-=2.25/2.75;return 7.5625*t*t+0.9375}t-=2.625/2.75;return 7.5625*t*t+0.984375}

// ─── EXPORT HOOK ──────────────────────────────────────────────────────────────
function useExport(renderFn,totalFrames,filename){
  const[prog,setProg]=useState(0);
  const[exporting,setExporting]=useState(false);
  const[blob,setBlob]=useState(null);
  const canvasRef=useRef(null);
  const run=useCallback(async(w,h)=>{
    setExporting(true);setProg(0);setBlob(null);
    if(!canvasRef.current)canvasRef.current=document.createElement("canvas");
    const canvas=canvasRef.current;canvas.width=w;canvas.height=h;
    const stream=canvas.captureStream(FPS);
    const rec=new MediaRecorder(stream,{mimeType:"video/webm",videoBitsPerSecond:8000000});
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data?.size>0)chunks.push(e.data)};
    rec.onstop=()=>{setBlob(new Blob(chunks,{type:"video/webm"}));setExporting(false);setProg(100)};
    rec.start();let f=0;
    await new Promise(res=>{
      const iv=setInterval(()=>{
        if(f>=totalFrames){clearInterval(iv);rec.requestData();setTimeout(()=>{rec.stop();res()},200);return}
        renderFn(canvas,f);rec.requestData();f++;setProg(Math.round((f/totalFrames)*100));
      },1000/FPS);
    });
  },[renderFn,totalFrames]);
  const download=useCallback(()=>{
    if(!blob)return;
    const u=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=u;a.download=filename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(u),2000);
  },[blob,filename]);
  return{run,download,prog,exporting,blob,setBlob};
}

// ─── APP: PROOF ───────────────────────────────────────────────────────────────
const PROOF_TMPLS=[{k:"dark",bg:"#0a0a0f",fg:"#f0f0f8",sub:"#9ca3af"},{k:"light",bg:"#f8f8fc",fg:"#111118",sub:"#6b7280"},{k:"brand",bg:"#0f172a",fg:"#e2e8f0",sub:"#94a3b8"}];

function parseParts(text){
  const parts=[];const re=/\*\*(.+?)\*\*/g;let last=0,m;
  while((m=re.exec(text))!==null){if(m.index>last)parts.push({t:text.slice(last,m.index),h:false});parts.push({t:m[1],h:true});last=m.index+m[0].length}
  if(last<text.length)parts.push({t:text.slice(last),h:false});
  return parts.length?parts:[{t:text,h:false}];
}

function drawProof(canvas,items,frame,tmplKey,fontFam,fontColor,bgImg,bgVid,logoImg){
  const ctx=canvas.getContext("2d");const{width:W,height:H}=canvas;
  const tm=PROOF_TMPLS.find(t=>t.k===tmplKey)||PROOF_TMPLS[0];
  const fam=ff(fontFam||"Inter");
  const sz=safeZone(W,H);
  ctx.clearRect(0,0,W,H);
  // Background: image/video or colour
  if(bgVid&&!bgVid.paused&&bgVid.readyState>=2){
    const s=Math.max(W/bgVid.videoWidth,H/bgVid.videoHeight);
    const sw=bgVid.videoWidth*s,sh=bgVid.videoHeight*s;
    ctx.drawImage(bgVid,(W-sw)/2,(H-sh)/2,sw,sh);
    ctx.fillStyle="rgba(0,0,0,0.45)";ctx.fillRect(0,0,W,H);
  } else if(bgImg&&bgImg.complete&&bgImg.naturalWidth){
    const s=Math.max(W/bgImg.naturalWidth,H/bgImg.naturalHeight);
    const sw=bgImg.naturalWidth*s,sh=bgImg.naturalHeight*s;
    ctx.drawImage(bgImg,(W-sw)/2,(H-sh)/2,sw,sh);
    ctx.fillStyle="rgba(0,0,0,0.45)";ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle=tm.bg;ctx.fillRect(0,0,W,H);
  }
  if(!items.length)return;
  const idx=Math.min(Math.floor(frame/SLIDE_FRAMES),items.length-1);
  const sf=frame%SLIDE_FRAMES,pr=sf/SLIDE_FRAMES;
  const fadeIn=Math.min(1,pr*6),fadeOut=pr>0.85?Math.max(0,1-(pr-0.85)/0.15):1;
  const alpha=Math.min(fadeIn,fadeOut),slideY=(1-Math.min(1,pr*4))*28;
  const item=items[idx];
  ctx.globalAlpha=alpha;ctx.save();ctx.translate(0,slideY);
  ctx.font=`bold ${Math.round(sz.w*0.12)}px Georgia,serif`;ctx.fillStyle=fontColor||tm.fg;ctx.globalAlpha=alpha*0.07;ctx.fillText('"',sz.x+sz.w*0.08,sz.y+sz.h*0.24);ctx.globalAlpha=alpha;
  const parts=parseParts(item.text);
  const fs=Math.round(sz.w*0.042),lh=fs*1.55,maxW=sz.w*0.82;
  let x=sz.x+sz.w*0.09,y=sz.y+sz.h*0.32;
  const tokens=[];parts.forEach(p=>p.t.split(" ").forEach(w=>{if(w)tokens.push({w:w+" ",h:p.h})}));
  let lineT=[],lineW=0;
  const renderLine=(toks,ly)=>{let lx=x;toks.forEach(tok=>{ctx.font=`${tok.h?"800":"600"} ${fs}px ${fam}`;if(tok.h){ctx.fillStyle="#fbbf24";ctx.fillRect(lx-2,ly-fs*0.84,ctx.measureText(tok.w.trimEnd()).width+4,fs*1.08);ctx.fillStyle="#111"}else ctx.fillStyle=fontColor||tm.fg;ctx.fillText(tok.w,lx,ly);lx+=ctx.measureText(tok.w).width})};
  tokens.forEach(tok=>{ctx.font=`${tok.h?"800":"600"} ${fs}px ${fam}`;const w=ctx.measureText(tok.w).width;if(lineW+w>maxW&&lineT.length){renderLine(lineT,y);y+=lh;lineT=[];lineW=0}lineT.push(tok);lineW+=w});
  if(lineT.length)renderLine(lineT,y);y+=lh*1.5;
  const stars=item.stars||5;ctx.font=`${Math.round(W*0.032)}px Arial`;ctx.fillStyle="#fbbf24";ctx.fillText("★".repeat(stars)+"☆".repeat(5-stars),x,y);y+=lh*1.2;
  ctx.font=`700 ${Math.round(fs*0.85)}px ${fam}`;ctx.fillStyle=fontColor||tm.fg;ctx.fillText(`— ${item.author}`,x,y);
  if(item.handle){ctx.font=`500 ${Math.round(fs*0.75)}px ${fam}`;ctx.fillStyle=tm.sub;ctx.fillText(item.handle,x,y+lh*0.9)}
  const dr=Math.round(sz.w*0.018),dotY=sz.y+sz.h*0.92,dw=items.length*dr*3;let dx=sz.x+(sz.w-dw)/2;
  items.forEach((_,di)=>{ctx.beginPath();ctx.arc(dx+dr,dotY,di===idx?dr*1.2:dr*0.7,0,Math.PI*2);ctx.fillStyle=di===idx?"#0ea5e9":`${tm.fg}44`;ctx.fill();dx+=dr*3});
  ctx.restore();ctx.globalAlpha=1;
  // Logo: small, bottom-left
  if(logoImg&&logoImg.complete&&logoImg.naturalWidth){
    const lh=Math.round(H*0.055),lw=Math.round(lh*logoImg.naturalWidth/logoImg.naturalHeight);
    const lx=W*0.06,ly=H*0.88;
    ctx.globalAlpha=0.85;ctx.drawImage(logoImg,lx,ly,lw,lh);ctx.globalAlpha=1;
  }
}

  const proofBgVidRef=useRef(null);
  const proofLogoRef=useRef(null);

  const prevRef=useRef(null);const animRef=useRef(null);const startRef=useRef(null);

  const renderFn=useCallback((canvas,f)=>drawProof(canvas,items,f,tmpl,proofFont,proofColor,proofBgImgRef.current,proofBgVidRef.current,proofLogoRef.current),[items,tmpl,proofFont,proofColor,proofBgImg,proofBgVid,proofLogo]);

  const runPrev=useCallback(()=>{const loop=ts=>{if(!startRef.current)startRef.current=ts;const f=Math.floor(((ts-startRef.current)/1000)*FPS);setCurFrame(f);drawPrev(f);animRef.current=requestAnimationFrame(loop)};animRef.current=requestAnimationFrame(loop)},[drawPrev]);
  useEffect(()=>{if(playing){startRef.current=null;runPrev()}else{if(animRef.current)cancelAnimationFrame(animRef.current);setTimeout(()=>drawPrev(0),60)}return()=>{if(animRef.current)cancelAnimationFrame(animRef.current)}},[playing,runPrev,drawPrev]);
  useEffect(()=>{if(!playing)setTimeout(()=>drawPrev(0),60)},[items,tmpl,proofFont,proofColor,proofBgImg,proofBgVid,proofLogo,drawPrev,playing]);
  const save=()=>{if(editIdx===null)return;const n=[...items];n[editIdx]={...editBuf};setItems(n);setEditIdx(null);setBlob(null)};
  const IS={width:"100%",padding:"8px 10px",borderRadius:8,background:"#f0f0f5",border:"1px solid rgba(0,0,0,0.1)",color:C.text,fontSize:12,outline:"none",marginTop:4};

];
const HOOK_STYLES={minimal:{bg:"#0a0a0f",fg:"#f0f0f8",acc:"#f59e0b"},bold:{bg:"#f59e0b",fg:"#0a0a0f",acc:"#0a0a0f"},impact:{bg:"#0f172a",fg:"#f8fafc",acc:"#f59e0b"}};

function drawHook(canvas,hook,name,imgEl,frame,fontFam,fontColor){
  const ctx=canvas.getContext("2d");const{width:W,height:H}=canvas;
  const s=HOOK_STYLES[hook.style]||HOOK_STYLES.minimal;
  const fam=ff(fontFam||"Inter");
  const t=frame/HOOK_FRAMES,eased=easeOut(Math.min(1,t*3));
  ctx.clearRect(0,0,W,H);ctx.fillStyle=s.bg;ctx.fillRect(0,0,W,H);
  if(imgEl){const ih=H*0.48;const sc=Math.max(W/imgEl.width,ih/imgEl.height);const sw=imgEl.width*sc,sh=imgEl.height*sc;ctx.globalAlpha=Math.min(1,t*2);ctx.drawImage(imgEl,(W-sw)/2,0,sw,sh);const g=ctx.createLinearGradient(0,ih*0.4,0,ih);g.addColorStop(0,"transparent");g.addColorStop(1,s.bg);ctx.fillStyle=g;ctx.fillRect(0,0,W,ih);ctx.globalAlpha=1}
  const py=imgEl?H*0.54:H*0.3,ps=Math.round(W*0.045);
  ctx.font=`700 ${ps}px ${fam}`;ctx.fillStyle=s.acc;ctx.globalAlpha=eased;ctx.fillText(hook.prefix,W*0.08,py+(1-eased)*18);
  const bs=Math.round(W*0.058),by=py+ps*2.2;
  ctx.font=`900 ${bs}px ${fam}`;ctx.fillStyle=fontColor||s.fg;
  const words=(name||"Your Product").split(" ");const maxW=W*0.84;let line="",ly=by;
  words.forEach(w=>{const test=line?line+" "+w:w;if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,W*0.08,ly+(1-eased)*28);ly+=bs*1.35;line=w}else line=test});
  if(line)ctx.fillText(line,W*0.08,ly+(1-eased)*28);
  ctx.globalAlpha=1;
  const barA=Math.min(1,Math.max(0,(t-0.5)*4));
  if(barA>0){ctx.globalAlpha=barA;ctx.fillStyle=s.acc;ctx.fillRect(0,H-H*0.1,W,H*0.1);ctx.font=`800 ${Math.round(W*0.045)}px ${fam}`;ctx.fillStyle=s.bg;ctx.textAlign="center";ctx.fillText("Shop Now →",W/2,H-H*0.1+H*0.065);ctx.textAlign="left";ctx.globalAlpha=1}
}

// ─── APP: REVEAL ──────────────────────────────────────────────────────────────
const REVEAL_STYLES=[{id:"swipe",label:"Swipe",desc:"Left reveals right"},{id:"split",label:"Split",desc:"Centre out"},{id:"flash",label:"Flash",desc:"White flash cut"},{id:"zoom",label:"Zoom",desc:"Zoom through"}];

function drawReveal(canvas,before,after,style,frame,fontFam,fontColor){
  const ctx=canvas.getContext("2d");const{width:W,height:H}=canvas;
  const fam=ff(fontFam||"Inter");
  ctx.clearRect(0,0,W,H);
  const dImg=(img,clip)=>{if(!img){ctx.fillStyle="#1a1a2e";ctx.fillRect(0,0,W,H);return}const s=Math.max(W/img.width,H/img.height);const sw=img.width*s,sh=img.height*s;if(clip){ctx.save();clip()}ctx.drawImage(img,(W-sw)/2,(H-sh)/2,sw,sh);if(clip)ctx.restore()};
  const label=(text,col)=>{ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,H-80,W,80);ctx.font=`700 ${Math.round(W*0.042)}px ${fam}`;ctx.fillStyle=fontColor||col;ctx.textAlign="center";ctx.fillText(text,W/2,H-38);ctx.textAlign="left"};
  if(frame<REVEAL_HOLD){dImg(before);label("Before","#fff");return}
  const tf=frame-REVEAL_HOLD,rawT=Math.min(1,tf/REVEAL_TRANS),t=easeMid(rawT);
  if(style==="swipe"){dImg(after);ctx.save();ctx.beginPath();ctx.rect(0,0,W*(1-t),H);ctx.clip();dImg(before);ctx.restore();const lx=W*(1-t);ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.stroke();if(rawT<0.8){ctx.fillStyle="rgba(255,255,255,0.9)";ctx.font=`bold ${Math.round(W*0.06)}px Arial`;ctx.textAlign="center";ctx.fillText("→",lx+W*0.04,H/2);ctx.textAlign="left"}}
  else if(style==="split"){dImg(after);const half=W*(1-t)/2;ctx.save();ctx.beginPath();ctx.rect(half,0,W-half*2,H);ctx.clip();dImg(before);ctx.restore();ctx.strokeStyle="#fff";ctx.lineWidth=2;[half,W-half].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()})}
  else if(style==="flash"){rawT<0.5?dImg(before):dImg(after);ctx.globalAlpha=Math.sin(rawT*Math.PI)*1.2;ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);ctx.globalAlpha=1}
  else if(style==="zoom"){dImg(before);if(rawT>0.1){const zt=easeMid(Math.max(0,(rawT-0.1)/0.9));ctx.save();ctx.globalAlpha=Math.min(1,zt*2);ctx.translate(W/2,H/2);ctx.scale(1+zt*0.4,1+zt*0.4);ctx.translate(-W/2,-H/2);dImg(after);ctx.restore()}}
  if(t>0.7){ctx.globalAlpha=(t-0.7)/0.3;label("After","#10b981");ctx.globalAlpha=1}
}

function RevealApp(){
  const[before,setBefore]=useState(null);const[after,setAfter]=useState(null);const[style,setStyle]=useState("swipe");const[playing,setPlaying]=useState(true);
  const[audio,setAudio]=useState(null);
  const[revFont,setRevFont]=useState("Inter");const[revColor,setRevColor]=useState("#ffffff");
  const bRef=useRef(null);const aRef=useRef(null);const prevRef=useRef(null);const animRef=useRef(null);const startRef=useRef(null);
  useEffect(()=>{if(before)loadImg(before).then(i=>bRef.current=i)},[before]);
  useEffect(()=>{if(after)loadImg(after).then(i=>aRef.current=i)},[after]);
  const drawPrev=useCallback(f=>{if(prevRef.current)drawReveal(prevRef.current,bRef.current,aRef.current,style,f%REVEAL_FRAMES,revFont,revColor)},[style,revFont,revColor]);
  const renderFn=useCallback((canvas,f)=>drawReveal(canvas,bRef.current,aRef.current,style,f,revFont,revColor),[style,revFont,revColor]);
  const{run,download,prog,exporting,blob,setBlob}=useExport(renderFn,REVEAL_FRAMES,`reveal-${style}.webm`);
  const runPrev=useCallback(()=>{const loop=ts=>{if(!startRef.current)startRef.current=ts;drawPrev(Math.floor(((ts-startRef.current)/1000)*FPS));animRef.current=requestAnimationFrame(loop)};animRef.current=requestAnimationFrame(loop)},[drawPrev]);
  useEffect(()=>{if(playing){startRef.current=null;runPrev()}else{if(animRef.current)cancelAnimationFrame(animRef.current);setTimeout(()=>drawPrev(0),60)}return()=>{if(animRef.current)cancelAnimationFrame(animRef.current)}},[playing,runPrev,drawPrev]);
  useEffect(()=>{if(!playing)setTimeout(()=>drawPrev(0),60)},[before,after,style,revFont,revColor,drawPrev,playing]);
  const canExp=before&&after&&!exporting;

function drawDrop(canvas,imgEl,orig,sale,headline,style,frame,fontFam,fontColor){
  const ctx=canvas.getContext("2d");const{width:W,height:H}=canvas;
  const fam=ff(fontFam||"Inter");
  const t=frame/DROP_FRAMES,p=DROP_PALETTES[style]||DROP_PALETTES.urgency;
  ctx.clearRect(0,0,W,H);ctx.fillStyle=p.bg;ctx.fillRect(0,0,W,H);
  if(imgEl){const ih=H*0.5;const s=Math.max(W/imgEl.width,ih/imgEl.height);const sw=imgEl.width*s,sh=imgEl.height*s;ctx.drawImage(imgEl,(W-sw)/2,0,sw,sh);const g=ctx.createLinearGradient(0,ih*0.4,0,ih);g.addColorStop(0,"transparent");g.addColorStop(1,p.bg);ctx.fillStyle=g;ctx.fillRect(0,0,W,ih+10)}
  const ts_=imgEl?H*0.52:H*0.2,px=W*0.08;let y=ts_;
  const eased=easeOut(Math.min(1,t*4));
  if(headline){ctx.font=`700 ${Math.round(W*0.042)}px ${fam}`;ctx.fillStyle=fontColor||p.txt;ctx.globalAlpha=eased;ctx.fillText(headline,px,y+(1-eased)*18);ctx.globalAlpha=1;y+=Math.round(W*0.042)*1.8}
  const disc=orig&&sale?Math.round((1-Number(sale)/Number(orig))*100):null;
  if(disc&&disc>0){const badgeA=easeOut(Math.min(1,Math.max(0,(t-0.1)*5)));ctx.globalAlpha=badgeA;const bh=Math.round(H*0.065),bw=Math.round(W*0.38);ctx.fillStyle=p.acc;ctx.beginPath();ctx.roundRect(px,y,bw,bh,bh/2);ctx.fill();ctx.font=`900 ${Math.round(bh*0.55)}px ${fam}`;ctx.fillStyle=style==="bold"?p.bg:"#fff";ctx.textAlign="center";ctx.fillText(`${disc}% OFF`,px+bw/2,y+bh*0.69);ctx.textAlign="left";ctx.globalAlpha=1;y+=bh+H*0.04}
  const priceA=easeOut(Math.min(1,Math.max(0,(t-0.2)*4)));ctx.globalAlpha=priceA;
  if(orig){const os=Math.round(W*0.052);ctx.font=`500 ${os}px ${fam}`;ctx.fillStyle=fontColor||p.txt;ctx.globalAlpha=priceA*0.35;ctx.fillText(`$${orig}`,px,y);const ow=ctx.measureText(`$${orig}`).width;ctx.strokeStyle=fontColor||p.txt;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px,y-os*0.3);ctx.lineTo(px+ow,y-os*0.3);ctx.stroke();ctx.globalAlpha=1;y+=os*1.6}
  if(sale){const ss=Math.round(W*0.13);const bp=bounceOut(Math.min(1,Math.max(0,(t-0.25)/0.4)));ctx.globalAlpha=Math.min(1,bp*3);ctx.save();ctx.translate(px,y);ctx.scale(0.7+0.3*bp,0.7+0.3*bp);ctx.font=`900 ${ss}px ${fam}`;ctx.fillStyle=p.acc;ctx.fillText(`$${sale}`,0,0);ctx.restore();ctx.globalAlpha=1;y+=ss*1.3}
  const stripA=easeOut(Math.min(1,Math.max(0,(t-0.6)*5)));
  if(stripA>0){ctx.globalAlpha=stripA;const sy=H*0.86,sh2=H*0.09;ctx.fillStyle=p.acc;ctx.fillRect(0,sy,W,sh2);ctx.font=`900 ${Math.round(sh2*0.42)}px ${fam}`;ctx.fillStyle=style==="bold"?p.bg:"#fff";ctx.textAlign="center";ctx.fillText(style==="urgency"?"⚡ LIMITED TIME OFFER":style==="bold"?"SHOP NOW →":"ORDER TODAY",W/2,sy+sh2*0.65);ctx.textAlign="left";ctx.globalAlpha=1}
}

function drawFlickDemo(canvas,t){

  const bgIdx=n>0?Math.floor(t/250)%n:0;
  const bg=n>0?_demoBgImgs[bgIdx]:null;
  ctx.clearRect(0,0,W,H);
  if(bg&&bg.complete&&bg.naturalWidth){
    const s=Math.max(W/bg.naturalWidth,H/bg.naturalHeight);

}

function drawRevealDemo(canvas,elapsed){
  const ctx=canvas.getContext("2d");const W=canvas.width,H=canvas.height;
  const CYCLE=3200;const t=(elapsed%CYCLE)/CYCLE;const HOLD=0.25;
  const drawBefore=()=>{ctx.fillStyle="#1a1a2a";ctx.fillRect(0,0,W,H);const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.6);g.addColorStop(0,"#2d2d44");g.addColorStop(1,"#0a0a14");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.globalAlpha=0.3;ctx.fillStyle="#4a4a6a";ctx.beginPath();ctx.arc(W/2,H*0.42,W*0.28,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1};
  const drawAfter=()=>{ctx.fillStyle="#0a1a0a";ctx.fillRect(0,0,W,H);const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.6);g.addColorStop(0,"#1a4a1a");g.addColorStop(1,"#050f05");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.globalAlpha=0.5;ctx.fillStyle="#22c55e";ctx.beginPath();ctx.arc(W/2,H*0.42,W*0.28,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1};
  const label=(txt,col)=>{ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,H-H*0.12,W,H*0.12);ctx.fillStyle=col;ctx.font=`700 ${Math.round(W*0.08)}px Inter,system-ui,sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(txt,W/2,H-H*0.06);ctx.textAlign="left";ctx.textBaseline="alphabetic"};
  if(t<HOLD){drawBefore();label("Before","rgba(255,255,255,0.9)");return}
  const raw=Math.min(1,(t-HOLD)/(1-HOLD*2));const ease=raw<0.5?4*raw*raw*raw:1-Math.pow(-2*raw+2,3)/2;
  drawAfter();ctx.save();ctx.beginPath();ctx.rect(0,0,W*(1-ease),H);ctx.clip();drawBefore();ctx.restore();
  const lx=W*(1-ease);ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.strokeStyle="rgba(255,255,255,0.9)";ctx.lineWidth=Math.max(2,W*0.006);ctx.stroke();
  if(ease>0.7){ctx.globalAlpha=(ease-0.7)/0.3;label("After","#10b981");ctx.globalAlpha=1}
}

function drawDropDemo(canvas,elapsed){
  const ctx=canvas.getContext("2d");const W=canvas.width,H=canvas.height;
  const CYCLE=4000;const t=(elapsed%CYCLE)/CYCLE;
  ctx.fillStyle="#0a0a0f";ctx.fillRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,0,H*0.5);g.addColorStop(0,"#1a0a0a");g.addColorStop(1,"#0a0a0f");ctx.fillStyle=g;ctx.fillRect(0,0,W,H*0.5);
  ctx.globalAlpha=0.5;ctx.font=`${Math.round(W*0.14)}px Arial`;ctx.textAlign="center";ctx.fillText("🔥",W/2,H*0.3);ctx.textAlign="left";ctx.globalAlpha=1;
  const px=W*0.1;let y=H*0.5;
  const ea=easeOut(Math.min(1,t*5));ctx.globalAlpha=ea;ctx.fillStyle="rgba(240,240,248,0.9)";ctx.font=`700 ${Math.round(W*0.065)}px Inter,system-ui,sans-serif`;ctx.fillText("Limited Time Deal",px,y+(1-ea)*16);y+=Math.round(W*0.065)*1.9;
  if(t>0.15){const bA=easeOut(Math.min(1,(t-0.15)*5));ctx.globalAlpha=bA;const bh=Math.round(H*0.07),bw=W*0.55;ctx.fillStyle="#ef4444";ctx.beginPath();ctx.roundRect(px,y,bw,bh,bh/2);ctx.fill();ctx.fillStyle="#fff";ctx.font=`900 ${Math.round(bh*0.52)}px Inter,system-ui,sans-serif`;ctx.textAlign="center";ctx.fillText("50% OFF",px+bw/2,y+bh*0.68);ctx.textAlign="left";ctx.globalAlpha=1;y+=bh+H*0.04}
  if(t>0.25){const pA=easeOut(Math.min(1,(t-0.25)*4));ctx.globalAlpha=pA*0.35;const os=Math.round(W*0.07);ctx.fillStyle="#f8f8fc";ctx.font=`500 ${os}px Inter,system-ui,sans-serif`;ctx.fillText("$99",px,y);const ow=ctx.measureText("$99").width;ctx.strokeStyle="#f8f8fc";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px,y-os*0.3);ctx.lineTo(px+ow,y-os*0.3);ctx.stroke();ctx.globalAlpha=1;y+=os*1.7}
  if(t>0.32){const bp=bounceOut(Math.min(1,(t-0.32)/0.35));const ss=Math.round(W*0.18);ctx.globalAlpha=Math.min(1,bp*2);ctx.save();ctx.translate(px,y);ctx.scale(0.5+0.5*bp,0.5+0.5*bp);ctx.fillStyle="#ef4444";ctx.font=`900 ${ss}px Inter,system-ui,sans-serif`;ctx.fillText("$49",0,0);ctx.restore();ctx.globalAlpha=1}
  if(t>0.65){const sA=easeOut(Math.min(1,(t-0.65)*4));ctx.globalAlpha=sA;const sy=H*0.87;ctx.fillStyle="#ef4444";ctx.fillRect(0,sy,W,H-sy);ctx.fillStyle="#fff";ctx.font=`800 ${Math.round((H-sy)*0.38)}px Inter,system-ui,sans-serif`;ctx.textAlign="center";ctx.fillText("⚡ LIMITED TIME",W/2,sy+(H-sy)*0.65);ctx.textAlign="left";ctx.globalAlpha=1}
}

function DemoCanvas({drawFn}){
  const canvasRef=useRef(null);const animRef=useRef(null);const startRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    let stopped=false;
    const loop=ts=>{
      if(stopped)return;
      if(!startRef.current)startRef.current=ts;
      try{drawFn(canvas,ts-startRef.current)}catch(e){/* skip a bad frame, keep the loop alive */}
      animRef.current=requestAnimationFrame(loop);
    };
    animRef.current=requestAnimationFrame(loop);
    return()=>{stopped=true;if(animRef.current)cancelAnimationFrame(animRef.current)};
  },[drawFn]);
  return <canvas ref={canvasRef} width={270} height={480} style={{width:"100%",height:"100%",display:"block",borderRadius:"inherit"}}/>;
}

// ─── GLOBAL TIMELINE BAR ─────────────────────────────────────────────────────
function FlickTimeline(){
  const[state,setState]=useState(null);
  useEffect(()=>{
    const iv=setInterval(()=>{if(window.__flickState)setState({...window.__flickState})},100);
    return()=>clearInterval(iv);
  },[]);
  if(!state)return null;
  const{bgs,curBg,playing,duration,ratio}=state;
  const maxItems=Math.min(bgs.length,40);
  const isD=window.innerWidth>=900;
  const itemW=Math.max(28,Math.min(64,(window.innerWidth*0.7)/Math.max(bgs.length,1)-4));
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"rgba(15,15,20,0.96)",backdropFilter:"blur(12px)",borderTop:"1px solid rgba(255,255,255,0.08)",padding:"8px 16px 10px",display:"flex",alignItems:"center",gap:12}}>
      {isD&&<div style={{flex:1}}/>}
      <span style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.35)",letterSpacing:"0.1em",textTransform:"uppercase",flexShrink:0}}>Timeline</span>
      <div style={{flex:isD?"0 1 auto":1,display:"flex",gap:3,overflowX:"auto",alignItems:"center",padding:"2px 0",justifyContent:isD?"center":"flex-start"}}>
        {bgs.length>0?bgs.slice(0,maxItems).map((s,i)=>(
          <div key={i} style={{position:"relative",width:itemW,height:38,borderRadius:6,overflow:"hidden",flexShrink:0,border:curBg===i&&playing?"2px solid #7c3aed":"2px solid rgba(255,255,255,0.1)",transition:"border-color 0.1s",boxShadow:curBg===i&&playing?"0 0 8px rgba(124,58,237,0.5)":"none"}}>
            <img src={s} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
            {curBg===i&&playing&&<div style={{position:"absolute",inset:0,background:"rgba(124,58,237,0.3)"}}/>}
          </div>
        )):(
          <span style={{fontSize:10,color:"rgba(255,255,255,0.2)"}}>Add backgrounds to see timeline</span>
        )}
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",flexShrink:0,gap:2,flex:isD?1:undefined}}>
        <span style={{fontSize:9,color:"rgba(255,255,255,0.35)",letterSpacing:"0.06em"}}>{ratio?.replace("x",":")} · {duration}s</span>
        {bgs.length>0&&<span style={{fontSize:9,color:"rgba(255,255,255,0.2)"}}>{curBg+1}/{bgs.length}</span>}
      </div>
    </div>
  );
}

// ─── PROOF TIMELINE ──────────────────────────────────────────────────────────
function ProofTimeline(){
  const[state,setState]=useState(null);
  useEffect(()=>{const iv=setInterval(()=>{if(window.__proofState)setState({...window.__proofState})},100);return()=>clearInterval(iv)},[]);
  if(!state)return null;
  const{items,curSlide,playing}=state;
  const isD=window.innerWidth>=900;
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"rgba(15,15,20,0.96)",backdropFilter:"blur(12px)",borderTop:"1px solid rgba(255,255,255,0.08)",padding:"8px 16px 10px",display:"flex",alignItems:"center",gap:12}}>
      {isD&&<div style={{flex:1}}/>}
      <span style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.35)",letterSpacing:"0.1em",textTransform:"uppercase",flexShrink:0}}>Timeline</span>
      <div style={{flex:isD?"0 1 auto":1,display:"flex",gap:3,overflowX:"auto",alignItems:"center",justifyContent:isD?"center":"flex-start"}}>
        {items.length>0?items.map((_,i)=>(
          <div key={i} style={{flexShrink:0,height:38,minWidth:48,borderRadius:6,background:curSlide===i&&playing?"rgba(14,165,233,0.3)":"rgba(255,255,255,0.06)",border:curSlide===i&&playing?"2px solid #0ea5e9":"2px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.1s",padding:"0 8px"}}>
            <span style={{fontSize:9,color:curSlide===i&&playing?"#7dd3fc":"rgba(255,255,255,0.4)",fontWeight:700}}>Slide {i+1}</span>
          </div>
        )):<span style={{fontSize:10,color:"rgba(255,255,255,0.2)"}}>Add testimonials to see timeline</span>}
      </div>
      <span style={{fontSize:9,color:"rgba(255,255,255,0.35)",flexShrink:0,flex:isD?1:undefined,textAlign:"right"}}>{curSlide+1}/{items.length}</span>
    </div>
  );
}

// ─── MINI TIMELINES (Hook / Reveal / Drop) ───────────────────────────────────
function MiniTimeline({stateKey,slots,color}){
  const[state,setState]=useState(null);
  useEffect(()=>{const iv=setInterval(()=>{if(window[stateKey])setState({...window[stateKey]})},100);return()=>clearInterval(iv)},[stateKey]);
  if(!state)return null;
  const isD=window.innerWidth>=900;
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"rgba(15,15,20,0.96)",backdropFilter:"blur(12px)",borderTop:"1px solid rgba(255,255,255,0.08)",padding:"8px 16px 10px",display:"flex",alignItems:"center",gap:12}}>
      {isD&&<div style={{flex:1}}/>}
      <span style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.35)",letterSpacing:"0.1em",textTransform:"uppercase",flexShrink:0}}>Timeline</span>
      <div style={{flex:isD?"0 1 auto":1,display:"flex",gap:3,overflowX:"auto",alignItems:"center",justifyContent:isD?"center":"flex-start"}}>
        {slots(state).map((slot,i)=>(
          <div key={i} style={{flexShrink:0,height:38,minWidth:52,borderRadius:6,background:slot.active?"rgba("+color+",0.25)":"rgba(255,255,255,0.06)",border:slot.active?"2px solid rgba("+color+",1)":"2px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 8px",transition:"all 0.1s"}}>
            <span style={{fontSize:9,color:slot.active?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.4)",fontWeight:700}}>{slot.label}</span>
          </div>
        ))}
      </div>
      {isD&&<div style={{flex:1}}/>}
    </div>
  );
}
function HookTimeline(){return<MiniTimeline stateKey="__hookState" color="245,158,11" slots={s=>s.active.map((_,i)=>({label:`Hook ${i+1}`,active:s.actH===i&&s.playing}))}/>}
function RevealTimeline(){return<MiniTimeline stateKey="__revealState" color="16,185,129" slots={s=>[{label:"Before",active:!s.playing},{label:"→ Reveal",active:s.playing},{label:"After",active:false}]}/>}
function DropTimeline(){return<MiniTimeline stateKey="__dropState" color="239,68,68" slots={s=>[{label:"Intro",active:s.playing},{label:"Price",active:s.playing},{label:"CTA",active:s.playing}]}/>}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function Root(){
  const[activeApp,setActiveApp]=useState(null);
  const[contactOpen,setContactOpen]=useState(false);
  useEffect(()=>{window.__setContact=setContactOpen;return()=>{delete window.__setContact}},[]);
  const activeAppMeta=APPS.find(a=>a.id===activeApp);
  return(
    <div style={{minHeight:"100vh",background:"#f0f0f6",display:"flex",flexDirection:"column"}}>
      <header style={{position:"sticky",top:0,zIndex:100,height:60,display:"flex",alignItems:"center",padding:"0 24px",gap:12,background:"#0d0d14",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0,boxShadow:"0 2px 16px rgba(0,0,0,0.3)"}}>
        <button onClick={()=>setActiveApp(null)} style={{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",cursor:"pointer",padding:0}}>
          <img src={LOGO_URL} alt="Scrolljack" style={{height:38,width:"auto",display:"block"}}/>
        </button>
        <div style={{flex:1}}/>
        {activeApp&&(
          <button onClick={()=>setActiveApp(null)} style={{padding:"6px 16px",borderRadius:99,fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.6)",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",cursor:"pointer",letterSpacing:"0.03em"}}>← Home</button>
        )}
        {!activeApp&&(
          <div style={{display:"flex",gap:8}}>
            {APPS.map(app=>(
              <button key={app.id} onClick={()=>setActiveApp(app.id)} style={{padding:"6px 14px",borderRadius:99,fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.75)",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",cursor:"pointer",display:"flex",alignItems:"center",gap:5,transition:"all 0.15s"}}>
                <span style={{fontSize:11}}>{app.icon}</span>{app.name}
              </button>
            ))}
          </div>
        )}
      </header>
      {activeApp&&(
        <div style={{display:"flex",gap:4,padding:"6px 16px",borderBottom:"1px solid rgba(0,0,0,0.06)",background:"#111118",overflowX:"auto",flexShrink:0}}>
          {APPS.map(app=>(
            <button key={app.id} onClick={()=>setActiveApp(app.id)} style={{padding:"5px 14px",fontSize:11,fontWeight:700,cursor:"pointer",borderRadius:99,border:"none",background:activeApp===app.id?app.color+"18":"transparent",color:activeApp===app.id?app.color:"rgba(255,255,255,0.75)",transition:"all 0.14s",whiteSpace:"nowrap",flexShrink:0,boxShadow:activeApp===app.id?`0 0 0 1px ${app.color}44`:"none",background:activeApp===app.id?app.color+"18":"transparent"}}>{app.icon} {app.name}</button>
          ))}
        </div>
      )}
      <div style={{flex:1,overflowY:"auto"}}>
        {!activeApp?<HomePage onSelect={setActiveApp}/>:(
          <div style={{width:"100%",padding:"0"}}>
            {activeApp==="flick"&&<FlickApp/>}
            {activeApp==="proof"&&<ProofApp/>}
            {activeApp==="hook"&&<HookApp/>}
            {activeApp==="reveal"&&<RevealApp/>}
            {activeApp==="drop"&&<DropApp/>}
          </div>
        )}
      </div>
      {/* Global timeline bar — fixed to bottom, only when in an app */}
      {activeApp==="flick"&&<FlickTimeline/>}
      {activeApp==="proof"&&<ProofTimeline/>}
      {activeApp==="hook"&&<HookTimeline/>}
      {activeApp==="reveal"&&<RevealTimeline/>}
      {activeApp==="drop"&&<DropTimeline/>}
      <ContactForm open={contactOpen} onClose={()=>setContactOpen(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
