  };

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function easeOut(t){return 1-Math.pow(1-t,3)}
function easeMid(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function bounceOut(t){if(t<1/2.75)return 7.5625*t*t;if(t<2/2.75){t-=1.5/2.75;return 7.5625*t*t+0.75}if(t<2.5/2.75){t-=2.25/2.75;return 7.5625*t*t+0.9375}t-=2.625/2.75;return 7.5625*t*t+0.984375}
function readFile(file){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(file)})}
function loadImg(src){return new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.src=src})}
function ff(f){return`'${f}',sans-serif`}

// ─── EXPORT HOOK ──────────────────────────────────────────────────────────────
function useExport(renderFn,totalFrames,filename){
  const[prog,setProg]=useState(0);
  const[exporting,setExporting]=useState(false);
  const[blob,setBlob]=useState(null);
  const canvasRef=useRef(null);
  const run=useCallback(async(w,h)=>{
    setExporting(true);setProg(0);setBlob(null);
    if(!canvasRef.current)canvasRef.current=document.createElement("canvas");
    const canvas=canvasRef.current;canvas.width=w;canvas.height=h;
    const stream=canvas.captureStream(FPS);
    const rec=new MediaRecorder(stream,{mimeType:"video/webm",videoBitsPerSecond:8000000});
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data?.size>0)chunks.push(e.data)};
    rec.onstop=()=>{setBlob(new Blob(chunks,{type:"video/webm"}));setExporting(false);setProg(100)};
    rec.start();let f=0;
    await new Promise(res=>{
      const iv=setInterval(()=>{
        if(f>=totalFrames){clearInterval(iv);rec.requestData();setTimeout(()=>{rec.stop();res()},200);return}
        renderFn(canvas,f);rec.requestData();f++;setProg(Math.round((f/totalFrames)*100));
      },1000/FPS);
    });
  },[renderFn,totalFrames]);
  const download=useCallback(()=>{
    if(!blob)return;
    const u=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=u;a.download=filename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(u),2000);
  },[blob,filename]);
  return{run,download,prog,exporting,blob,setBlob};
}

function SLabel({n,title,color,opt}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:7}}>
      <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,fontWeight:400,letterSpacing:"0.1em",textTransform:"uppercase",color:color||C.purple}}>
        <span style={{opacity:0.35}}>{n} </span>{title}
      </span>
      {opt&&<span style={{fontSize:8,color:C.muted,fontWeight:500,fontFamily:"Montserrat,sans-serif"}}>optional</span>}
    </div>
  );
}

function DZ({id,accept,multi,onFiles,dragColor,children,compact}){
  const[ov,setOv]=useState(false);
  return(
    <div
      onDragOver={e=>{e.preventDefault();setOv(true)}}
      onDragLeave={()=>setOv(false)}
      onDrop={e=>{e.preventDefault();setOv(false);onFiles(Array.from(e.dataTransfer.files))}}
      onClick={()=>document.getElementById(id)?.click()}
      style={{border:`2px dashed ${ov?(dragColor||"rgba(124,58,237,0.7)"):"rgba(0,0,0,0.12)"}`,borderRadius:10,padding:compact?"10px":"13px 10px",cursor:"pointer",textAlign:"center",background:ov?"rgba(124,58,237,0.04)":"rgba(255,255,255,0.01)",transition:"border-color 0.15s"}}>
      {children}
      <input id={id} type="file" accept={accept} multiple={multi} style={{display:"none"}} onChange={e=>onFiles(Array.from(e.target.files))}/>
    </div>
  );
}

function Toggle({on,onClick,color,label}){
  const c=color||"#7c3aed";
  return(
    <button onClick={onClick} aria-pressed={on} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",padding:0,flexShrink:0}}>
      {label&&<span style={{fontSize:10,fontWeight:700,color:on?c:"#9ca3af"}}>{label}</span>}
      <span style={{width:36,height:21,borderRadius:99,background:on?c:"rgba(0,0,0,0.15)",position:"relative",transition:"background 0.18s ease",flexShrink:0,display:"inline-block"}}>
        <span style={{position:"absolute",top:2,left:on?17:2,width:17,height:17,borderRadius:99,background:"#fff",boxShadow:"0 1px 3px rgba(0,0,0,0.3)",transition:"left 0.18s cubic-bezier(0.4,0,0.2,1)"}}/>
      </span>
    </button>
  );
}

function Pill({active,onClick,color,children}){
  const c=color||C.purple;

}

function ExportArea({disabled,onRender,exporting,prog,blob,onDownload,label,status}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <button onClick={onRender} disabled={disabled} className={!disabled&&!exporting?"animated-gradient":""} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:disabled?"rgba(255,255,255,0.05)":exporting?"rgba(255,255,255,0.05)":undefined,color:!disabled?"#fff":C.muted,fontSize:14,fontWeight:800,cursor:!disabled?"pointer":"not-allowed",boxShadow:!disabled&&!exporting?"0 0 28px rgba(200,40,200,0.35)":"none",transition:"all 0.18s"}}>
        {exporting?(status||`Rendering… ${prog}%`):"⚙ Render Video"}
      </button>
      {exporting&&<div style={{height:3,borderRadius:99,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}><div style={{height:"100%",width:`${prog}%`,background:"linear-gradient(90deg,#7c3aed,#ec4899)",transition:"width 0.1s",borderRadius:99}}/></div>}
      {blob&&!exporting&&<button onClick={onDownload} style={{width:"100%",padding:"13px",borderRadius:10,border:"1px solid rgba(52,211,153,0.4)",background:"rgba(52,211,153,0.08)",color:"#6ee7b7",fontSize:14,fontWeight:800,cursor:"pointer",animation:"pulseGreen 1.6s ease-in-out infinite"}}>↓ Download {label} · {(blob.size/1024/1024).toFixed(1)} MB</button>}
    </div>
  );
}

function PreviewCanvas({canvasRef,W,H,empty,emptyIcon,emptyText}){
  const pw=Math.min(window.innerWidth-32,280);
  const ph=Math.round(pw*H/W);
  return(
    <div style={{position:"relative",borderRadius:12,overflow:"hidden",boxShadow:"0 0 0 1px rgba(255,255,255,0.07),0 16px 48px rgba(0,0,0,0.7)",background:"#22223a",width:pw,height:ph,flexShrink:0,alignSelf:"center"}}>
      <canvas ref={canvasRef} width={W} height={H} style={{width:pw,height:ph,display:"block"}}/>
      {empty&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,background:"rgba(9,9,16,0.92)"}}><div style={{fontSize:26,opacity:0.1}}>{emptyIcon}</div><p style={{fontSize:11,color:"#6b7280",margin:0,textAlign:"center",padding:"0 16px"}}>{emptyText}</p></div>}
    </div>
  );
}

function PlayBtn({playing,onToggle,color}){
  return(
    <button onClick={onToggle} style={{padding:"6px 16px",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer",background:playing?"rgba(239,68,68,0.1)":`${color||C.purple}22`,border:`1px solid ${playing?"rgba(239,68,68,0.28)":`${color||C.purple}44`}`,color:playing?"#f87171":"#c4b5fd"}}>
      {playing?"⏹ Stop":"▶ Play"}
    </button>
  );
}

function Hint({children}){return <p style={{fontSize:11,color:C.muted,textAlign:"center",margin:0,lineHeight:1.5}}>{children}</p>}

function AudioChip({name,dur,onRemove}){
  return(
    <div style={{padding:"9px 11px",border:"1px solid rgba(52,211,153,0.28)",borderRadius:9,background:"rgba(52,211,153,0.05)",display:"flex",alignItems:"center",gap:8}}>
      <span>♪</span>
      <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,fontWeight:600,color:"#6ee7b7",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>{dur&&<div style={{fontSize:9,color:C.muted}}>{dur.toFixed(1)}s</div>}</div>
      <button onClick={onRemove} style={{background:"rgba(239,68,68,0.13)",border:"1px solid rgba(239,68,68,0.22)",color:"#f87171",width:22,height:22,borderRadius:99,fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
    </div>
  );
}

// ─── FONT + COLOUR PICKER ─────────────────────────────────────────────────────
function FontColorPicker({font,setFont,color,setColor,accent}){
  const ac=accent||C.purple;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12,padding:"12px",background:"#f5f5fa",borderRadius:10,border:"1px solid rgba(255,255,255,0.06)"}}>
      <div>
        <div style={{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:7}}>Font</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
          {GFONTS.map(f=>(
            <button key={f.id} onClick={()=>setFont(f.id)} style={{padding:"7px 8px",borderRadius:7,border:"1px solid",borderColor:font===f.id?ac:"rgba(255,255,255,0.08)",background:font===f.id?ac+"22":"rgba(255,255,255,0.02)",cursor:"pointer",textAlign:"left",transition:"all 0.12s",display:"flex",flexDirection:"column",gap:1}}>
              <span style={{fontFamily:`'${f.id}',sans-serif`,fontSize:13,fontWeight:700,color:font===f.id?"#e8e8f2":"#9ca3af",lineHeight:1.2}}>{f.name}</span>
              <span style={{fontSize:8,color:"#5b6470",letterSpacing:"0.06em",textTransform:"uppercase"}}>{f.cat}</span>
            </button>
          ))}
        </div>
      </div>
      <div>
        <div style={{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:7}}>Text Colour</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
          {PALETTE.map(c=>(
            <button key={c} onClick={()=>setColor(c)} style={{width:22,height:22,borderRadius:5,background:c,border:"none",cursor:"pointer",outline:color===c?`2px solid ${ac}`:"2px solid transparent",outlineOffset:1,transition:"outline 0.1s",flexShrink:0}}/>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <input type="color" value={color} onChange={e=>setColor(e.target.value)} style={{width:32,height:28,border:"none",background:"none",cursor:"pointer",padding:0,borderRadius:5}}/>
          <span style={{fontSize:11,color:"#5b6470",fontFamily:"monospace"}}>{color}</span>
          <div style={{width:18,height:18,borderRadius:4,background:color,border:"1px solid rgba(255,255,255,0.15)",flexShrink:0}}/>
        </div>
      </div>
    </div>
  );
}

  const[ctaFont,setCtaFont]=useState("Inter");
  const[ctaColor,setCtaColor]=useState("#ffffff");
  const[ctaPos,setCtaPos]=useState({x:50,y:91});
  const[ctaSize,setCtaSize]=useState(32);
  const[ctaArrow,setCtaArrow]=useState(true);
  // Background colour overlay (tint)
  const[overlayOn,setOverlayOn]=useState(true);
  const[overlayColor,setOverlayColor]=useState("black"); // "black" | "white"
  const[overlayOpacity,setOverlayOpacity]=useState(22); // 0-100
  const[emojiSize,setEmojiSize]=useState(40);
  // Per-element positions (all as % of canvas)
  const[logoPos,setLogoPos]=useState({x:50,y:50,s:55});
  const[textPos,setTextPos]=useState({x:50,y:42});

// ─── APP: PROOF ───────────────────────────────────────────────────────────────
const PROOF_TMPLS=[{k:"dark",bg:"#0a0a0f",fg:"#f0f0f8",sub:"#9ca3af"},{k:"light",bg:"#f8f8fc",fg:"#111118",sub:"#6b7280"},{k:"brand",bg:"#0f172a",fg:"#e2e8f0",sub:"#94a3b8"}];

function parseParts(text){
  const parts=[];const re=/\*\*(.+?)\*\*/g;let last=0,m;
  while((m=re.exec(text))!==null){if(m.index>last)parts.push({t:text.slice(last,m.index),h:false});parts.push({t:m[1],h:true});last=m.index+m[0].length}
  if(last<text.length)parts.push({t:text.slice(last),h:false});
  return parts.length?parts:[{t:text,h:false}];
}

function drawProof(canvas,items,frame,tmplKey,fontFam,fontColor,bgImg,bgVid,logoImg){
  const ctx=canvas.getContext("2d");const{width:W,height:H}=canvas;
  const tm=PROOF_TMPLS.find(t=>t.k===tmplKey)||PROOF_TMPLS[0];
  const fam=ff(fontFam||"Inter");
  const sz=safeZone(W,H);
  ctx.clearRect(0,0,W,H);
  // Background: image/video or colour
  if(bgVid&&!bgVid.paused&&bgVid.readyState>=2){
    const s=Math.max(W/bgVid.videoWidth,H/bgVid.videoHeight);
    const sw=bgVid.videoWidth*s,sh=bgVid.videoHeight*s;
    ctx.drawImage(bgVid,(W-sw)/2,(H-sh)/2,sw,sh);
    ctx.fillStyle="rgba(0,0,0,0.45)";ctx.fillRect(0,0,W,H);
  } else if(bgImg&&bgImg.complete&&bgImg.naturalWidth){
    const s=Math.max(W/bgImg.naturalWidth,H/bgImg.naturalHeight);
    const sw=bgImg.naturalWidth*s,sh=bgImg.naturalHeight*s;
    ctx.drawImage(bgImg,(W-sw)/2,(H-sh)/2,sw,sh);
    ctx.fillStyle="rgba(0,0,0,0.45)";ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle=tm.bg;ctx.fillRect(0,0,W,H);
  }
  if(!items.length)return;
  const idx=Math.min(Math.floor(frame/SLIDE_FRAMES),items.length-1);
  const sf=frame%SLIDE_FRAMES,pr=sf/SLIDE_FRAMES;
  const fadeIn=Math.min(1,pr*6),fadeOut=pr>0.85?Math.max(0,1-(pr-0.85)/0.15):1;
  const alpha=Math.min(fadeIn,fadeOut),slideY=(1-Math.min(1,pr*4))*28;
  const item=items[idx];
  ctx.globalAlpha=alpha;ctx.save();ctx.translate(0,slideY);
  ctx.font=`bold ${Math.round(sz.w*0.12)}px Georgia,serif`;ctx.fillStyle=fontColor||tm.fg;ctx.globalAlpha=alpha*0.07;ctx.fillText('"',sz.x+sz.w*0.08,sz.y+sz.h*0.24);ctx.globalAlpha=alpha;
  const parts=parseParts(item.text);
  const fs=Math.round(sz.w*0.042),lh=fs*1.55,maxW=sz.w*0.82;
  let x=sz.x+sz.w*0.09,y=sz.y+sz.h*0.32;
  const tokens=[];parts.forEach(p=>p.t.split(" ").forEach(w=>{if(w)tokens.push({w:w+" ",h:p.h})}));
  let lineT=[],lineW=0;
  const renderLine=(toks,ly)=>{let lx=x;toks.forEach(tok=>{ctx.font=`${tok.h?"800":"600"} ${fs}px ${fam}`;if(tok.h){ctx.fillStyle="#fbbf24";ctx.fillRect(lx-2,ly-fs*0.84,ctx.measureText(tok.w.trimEnd()).width+4,fs*1.08);ctx.fillStyle="#111"}else ctx.fillStyle=fontColor||tm.fg;ctx.fillText(tok.w,lx,ly);lx+=ctx.measureText(tok.w).width})};
  tokens.forEach(tok=>{ctx.font=`${tok.h?"800":"600"} ${fs}px ${fam}`;const w=ctx.measureText(tok.w).width;if(lineW+w>maxW&&lineT.length){renderLine(lineT,y);y+=lh;lineT=[];lineW=0}lineT.push(tok);lineW+=w});
  if(lineT.length)renderLine(lineT,y);y+=lh*1.5;
  const stars=item.stars||5;ctx.font=`${Math.round(W*0.032)}px Arial`;ctx.fillStyle="#fbbf24";ctx.fillText("★".repeat(stars)+"☆".repeat(5-stars),x,y);y+=lh*1.2;
  ctx.font=`700 ${Math.round(fs*0.85)}px ${fam}`;ctx.fillStyle=fontColor||tm.fg;ctx.fillText(`— ${item.author}`,x,y);
  if(item.handle){ctx.font=`500 ${Math.round(fs*0.75)}px ${fam}`;ctx.fillStyle=tm.sub;ctx.fillText(item.handle,x,y+lh*0.9)}
  const dr=Math.round(sz.w*0.018),dotY=sz.y+sz.h*0.92,dw=items.length*dr*3;let dx=sz.x+(sz.w-dw)/2;
  items.forEach((_,di)=>{ctx.beginPath();ctx.arc(dx+dr,dotY,di===idx?dr*1.2:dr*0.7,0,Math.PI*2);ctx.fillStyle=di===idx?"#0ea5e9":`${tm.fg}44`;ctx.fill();dx+=dr*3});
  ctx.restore();ctx.globalAlpha=1;
  // Logo: small, bottom-left
  if(logoImg&&logoImg.complete&&logoImg.naturalWidth){
    const lh=Math.round(H*0.055),lw=Math.round(lh*logoImg.naturalWidth/logoImg.naturalHeight);
    const lx=W*0.06,ly=H*0.88;
    ctx.globalAlpha=0.85;ctx.drawImage(logoImg,lx,ly,lw,lh);ctx.globalAlpha=1;
  }
}

          {proofLogo?<div style={{display:"flex",alignItems:"center",gap:8}}><img src={proofLogo} style={{maxWidth:80,maxHeight:32,objectFit:"contain"}} alt=""/><span style={{fontSize:11,color:"#8b5cf6"}}>Tap to replace</span></div>:<span style={{fontSize:11,color:"#9ca3af"}}>🏷 Drop logo PNG/SVG — shows bottom-left</span>}

  return(
    <ThreeColLayout isDesktop={isDesktop} left={proofLeft} centre={proofCentre} right={proofRight}
      onRender={()=>run(PW,PH)} exporting={exporting} prog={prog} blob={blob} onDownload={download}

  );
}

// ─── APP: HOOK ────────────────────────────────────────────────────────────────
const HOOK_LIST=[
  {id:"nobody",prefix:"Nobody talks about this…",style:"minimal"},
  {id:"wish",  prefix:"I wish I knew this sooner…",style:"bold"},
  {id:"easiest",prefix:"The easiest way to…",style:"impact"},
  {id:"secret",prefix:"The secret nobody tells you…",style:"minimal"},
  {id:"stop",  prefix:"Stop doing this if you…",style:"bold"},
  {id:"why",   prefix:"This is why you're not…",style:"impact"},
];
const HOOK_STYLES={minimal:{bg:"#0a0a0f",fg:"#f0f0f8",acc:"#f59e0b"},bold:{bg:"#f59e0b",fg:"#0a0a0f",acc:"#0a0a0f"},impact:{bg:"#0f172a",fg:"#f8fafc",acc:"#f59e0b"}};

function drawHook(canvas,hook,name,imgEl,frame,fontFam,fontColor){
  const ctx=canvas.getContext("2d");const{width:W,height:H}=canvas;
  const s=HOOK_STYLES[hook.style]||HOOK_STYLES.minimal;
  const fam=ff(fontFam||"Inter");
  const t=frame/HOOK_FRAMES,eased=easeOut(Math.min(1,t*3));
  ctx.clearRect(0,0,W,H);ctx.fillStyle=s.bg;ctx.fillRect(0,0,W,H);
  if(imgEl){const ih=H*0.48;const sc=Math.max(W/imgEl.width,ih/imgEl.height);const sw=imgEl.width*sc,sh=imgEl.height*sc;ctx.globalAlpha=Math.min(1,t*2);ctx.drawImage(imgEl,(W-sw)/2,0,sw,sh);const g=ctx.createLinearGradient(0,ih*0.4,0,ih);g.addColorStop(0,"transparent");g.addColorStop(1,s.bg);ctx.fillStyle=g;ctx.fillRect(0,0,W,ih);ctx.globalAlpha=1}
  const py=imgEl?H*0.54:H*0.3,ps=Math.round(W*0.045);
  ctx.font=`700 ${ps}px ${fam}`;ctx.fillStyle=s.acc;ctx.globalAlpha=eased;ctx.fillText(hook.prefix,W*0.08,py+(1-eased)*18);
  const bs=Math.round(W*0.058),by=py+ps*2.2;
  ctx.font=`900 ${bs}px ${fam}`;ctx.fillStyle=fontColor||s.fg;
  const words=(name||"Your Product").split(" ");const maxW=W*0.84;let line="",ly=by;
  words.forEach(w=>{const test=line?line+" "+w:w;if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,W*0.08,ly+(1-eased)*28);ly+=bs*1.35;line=w}else line=test});
  if(line)ctx.fillText(line,W*0.08,ly+(1-eased)*28);
  ctx.globalAlpha=1;
  const barA=Math.min(1,Math.max(0,(t-0.5)*4));
  if(barA>0){ctx.globalAlpha=barA;ctx.fillStyle=s.acc;ctx.fillRect(0,H-H*0.1,W,H*0.1);ctx.font=`800 ${Math.round(W*0.045)}px ${fam}`;ctx.fillStyle=s.bg;ctx.textAlign="center";ctx.fillText("Shop Now →",W/2,H-H*0.1+H*0.065);ctx.textAlign="left";ctx.globalAlpha=1}
}

function HookApp(){
  const[name,setName]=useState("");
  const[img,setImg]=useState(null);
  const[sel,setSel]=useState(new Set(["nobody","wish","easiest"]));
  const[actH,setActH]=useState(0);
  const[playing,setPlaying]=useState(true);
  const[hookFont,setHookFont]=useState("Inter");
  const[audio,setAudio]=useState(null);
  const[hookColor,setHookColor]=useState("#f0f0f8");
  const imgRef=useRef(null);const prevRef=useRef(null);const animRef=useRef(null);const startRef=useRef(null);
  const active=HOOK_LIST.filter(h=>sel.has(h.id));
  const total=active.length*HOOK_FRAMES;
  useEffect(()=>{if(!img){imgRef.current=null;return}loadImg(img).then(i=>imgRef.current=i)},[img]);
  const drawPrev=useCallback(f=>{if(!prevRef.current||!active.length)return;const hi=Math.floor(f/HOOK_FRAMES)%active.length;setActH(hi);drawHook(prevRef.current,active[hi],name,imgRef.current,f%HOOK_FRAMES,hookFont,hookColor)},[active,name,hookFont,hookColor]);
  const renderFn=useCallback((canvas,f)=>{if(!active.length)return;const hi=Math.floor(f/HOOK_FRAMES)%active.length;drawHook(canvas,active[hi],name,imgRef.current,f%HOOK_FRAMES,hookFont,hookColor)},[active,name,hookFont,hookColor]);
  const{run,download,prog,exporting,blob,setBlob}=useExport(renderFn,total,"hook-ads.webm");
  const runPrev=useCallback(()=>{const loop=ts=>{if(!startRef.current)startRef.current=ts;drawPrev(Math.floor(((ts-startRef.current)/1000)*FPS));animRef.current=requestAnimationFrame(loop)};animRef.current=requestAnimationFrame(loop)},[drawPrev]);
  useEffect(()=>{if(playing){startRef.current=null;runPrev()}else{if(animRef.current)cancelAnimationFrame(animRef.current);setTimeout(()=>drawPrev(0),60)}return()=>{if(animRef.current)cancelAnimationFrame(animRef.current)}},[playing,runPrev,drawPrev]);
  useEffect(()=>{if(!playing)setTimeout(()=>drawPrev(0),60)},[name,img,sel,hookFont,hookColor,drawPrev,playing]);
  const toggle=id=>{setSel(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n});setBlob(null)};
  const canExp=active.length>0&&name.trim().length>0&&!exporting;
  useEffect(()=>{window.__hookState={active,actH,playing};return()=>{delete window.__hookState}},[active,actH,playing]);
  const isDesktop=window.innerWidth>=900;
  const PW=675,PH=1200;
  const hookLeft=(
    <>
      <div className="card-white" style={{padding:"12px 14px"}}>
        <SLabel n="01" title="Product Image" color={C.amber} opt/>
        <DZ id="hk-img" accept="image/*" onFiles={async f=>{const d=await readFile(f[0]);setImg(d)}} dragColor="rgba(245,158,11,0.7)" compact>
          {img?<div style={{display:"flex",alignItems:"center",gap:10}}><img src={img} style={{width:44,height:44,objectFit:"cover",borderRadius:6}} alt=""/><span style={{fontSize:12,color:"#9ca3af"}}>Tap to replace</span></div>:<><div style={{fontSize:16,opacity:0.25,marginBottom:3}}>📦</div><div style={{fontSize:13,color:"#9ca3af"}}>Drop product image</div></>}
        </DZ>
      </div>
      <div className="card-white" style={{padding:"12px 14px"}}>
        <SLabel n="02" title="Product Name" color={C.amber}/>
        <input value={name} onChange={e=>{setName(e.target.value);setBlob(null)}} placeholder="e.g. Cold Brew Concentrate" style={{width:"100%",padding:"10px 12px",borderRadius:9,background:"#f5f5fa",border:"1px solid rgba(0,0,0,0.08)",color:"#111118",fontSize:13,outline:"none",marginTop:8}}/>
      </div>
      <div className="card-white" style={{padding:"12px 14px"}}>
        <SLabel n="03" title={`Hooks (${sel.size} selected)`} color="#fbbf24"/>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {HOOK_LIST.map(h=>(
            <button key={h.id} onClick={()=>toggle(h.id)} style={{padding:"10px 12px",borderRadius:9,border:"1px solid",borderColor:sel.has(h.id)?"rgba(245,158,11,0.5)":"rgba(0,0,0,0.07)",background:sel.has(h.id)?"rgba(245,158,11,0.08)":"#f8f8fc",color:sel.has(h.id)?"#92400e":"#6b7280",cursor:"pointer",textAlign:"left",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:8,transition:"all 0.14s"}}>
              <span style={{opacity:sel.has(h.id)?1:0.3,fontSize:10,flexShrink:0}}>{sel.has(h.id)?"✓":"○"}</span>{h.prefix}
            </button>
          ))}
        </div>
      </div>
      <div className="card-white" style={{padding:"12px 14px"}}>
        <SLabel n="04" title="Font & Colour" color="#fbbf24"/>
        <FontColorPicker font={hookFont} setFont={f=>{setHookFont(f);setBlob(null)}} color={hookColor} setColor={c=>{setHookColor(c);setBlob(null)}} accent={C.amber}/>
      </div>
    </>
  );
  const hookRight=(
    <div className="card-white" style={{padding:"12px 14px"}}>
      <SLabel n="05" title="Audio" color={C.green} opt/>
      {audio?<AudioChip name={audio.name} dur={audio.dur} onRemove={()=>setAudio(null)}/>:<DZ id="hk-audio" accept="audio/*" onFiles={f=>{const file=f[0];if(!file)return;const u=URL.createObjectURL(file);const tmp=new Audio(u);tmp.onloadedmetadata=()=>setAudio({name:file.name,url:u,dur:tmp.duration})}} dragColor="rgba(52,211,153,0.6)" compact><div style={{fontSize:12,color:"#9ca3af"}}>♪ Drop MP3 / WAV</div></DZ>}
    </div>
  );
  const hookCentre=(
    <>
      <div style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <span style={{fontSize:10,fontWeight:700,color:"#9ca3af",letterSpacing:"0.08em",textTransform:"uppercase"}}>Hook {actH+1} / {active.length}</span>
        <PlayBtn playing={playing} onToggle={()=>setPlaying(p=>!p)} color={C.amber}/>
      </div>
      <CentrePreview canvasRef={prevRef} PW={675} PH={1200} playing={playing} onToggle={()=>setPlaying(p=>!p)} accentColor={C.amber} empty={!active.length} emptyIcon="🎣" emptyText="Select hooks to preview" dots={active.map((_,i)=>actH===i&&playing)}/>
    </>
  );
  return(
    <ThreeColLayout isDesktop={isDesktop} left={hookLeft} centre={hookCentre} right={hookRight}
      onRender={()=>run(675,1200)} exporting={exporting} prog={prog} blob={blob} onDownload={download}
      downloadLabel={`${active.length} Hook Ads .webm`}
      exportHint={!name.trim()?"Enter a product name":sel.size===0?"Select at least one hook":"Ready to render"}
      mobile={<div style={{display:"flex",flexDirection:"column",gap:16,padding:"16px 16px 80px"}}>{hookLeft}<CentrePreview canvasRef={prevRef} PW={675} PH={1200} playing={playing} onToggle={()=>setPlaying(p=>!p)} accentColor={C.amber} empty={!active.length} emptyIcon="🎣" emptyText="Select hooks to preview"/><ExportArea disabled={!canExp} onRender={()=>run(675,1200)} exporting={exporting} prog={prog} blob={blob} onDownload={download} label={`${active.length} Hook Ads .webm`}/></div>}
    />
  );
}

const _revealHandleImg=(()=>{const i=new Image();i.src=REVEAL_HANDLE;return i})();
const REVEAL_STYLES=[{id:"swipe",label:"Swipe",desc:"Left reveals right"},{id:"split",label:"Split",desc:"Centre out"},{id:"flash",label:"Flash",desc:"White flash cut"},{id:"zoom",label:"Zoom",desc:"Zoom through"}];

function drawReveal(canvas,before,after,style,frame,fontFam,fontColor,title,subline){
  const ctx=canvas.getContext("2d");const{width:W,height:H}=canvas;
  const fam=ff(fontFam||"Inter");
  const sz=safeZone(W,H);
  ctx.clearRect(0,0,W,H);
  const dImg=(img,clip)=>{if(!img){ctx.fillStyle="#1a1a2e";ctx.fillRect(0,0,W,H);return}const s=Math.max(W/img.width,H/img.height);const sw=img.width*s,sh=img.height*s;if(clip){ctx.save();clip()}ctx.drawImage(img,(W-sw)/2,(H-sh)/2,sw,sh);if(clip)ctx.restore()};
  const label=(text,col)=>{ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,H-80,W,80);ctx.font=`700 ${Math.round(W*0.042)}px ${fam}`;ctx.fillStyle=fontColor||col;ctx.textAlign="center";ctx.fillText(text,W/2,H-38);ctx.textAlign="left"};
  // Map the incoming frame onto a forward-then-reverse (ping-pong) timeline, so the
  // reveal plays before->after, holds, then plays back after->before before looping.
  // Cycle length matches REVEAL_LOOP_FRAMES exactly so RevealApp's loop count math lines up.
  const f2=frame%REVEAL_LOOP_FRAMES;
  const mapped=f2<REVEAL_FRAMES?f2:(REVEAL_LOOP_FRAMES-f2+REVEAL_HOLD-1);
  if(mapped<REVEAL_HOLD){dImg(before);label("Before","#fff")}
  else{
    const tf=mapped-REVEAL_HOLD,rawT=Math.min(1,tf/REVEAL_TRANS),t=easeMid(rawT);
    if(style==="swipe"){dImg(after);ctx.save();ctx.beginPath();ctx.rect(0,0,W*(1-t),H);ctx.clip();dImg(before);ctx.restore();const lx=W*(1-t);ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.stroke();
      // Decorative swipe-handle icon centred on the divider line (visual only, not interactive)
      if(_revealHandleImg.complete&&_revealHandleImg.naturalWidth){const hs=Math.round(W*0.11);ctx.globalAlpha=0.95;ctx.drawImage(_revealHandleImg,lx-hs/2,H/2-hs*0.89/2,hs,hs*0.89);ctx.globalAlpha=1}
    }
    else if(style==="split"){dImg(after);const half2=W*(1-t)/2;ctx.save();ctx.beginPath();ctx.rect(half2,0,W-half2*2,H);ctx.clip();dImg(before);ctx.restore();ctx.strokeStyle="#fff";ctx.lineWidth=2;[half2,W-half2].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()});
      if(_revealHandleImg.complete&&_revealHandleImg.naturalWidth){const hs=Math.round(W*0.09);ctx.globalAlpha=0.95;ctx.drawImage(_revealHandleImg,W/2-hs/2,H/2-hs*0.89/2,hs,hs*0.89);ctx.globalAlpha=1}
    }
    else if(style==="flash"){rawT<0.5?dImg(before):dImg(after);ctx.globalAlpha=Math.sin(rawT*Math.PI)*1.2;ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);ctx.globalAlpha=1}
    else if(style==="zoom"){dImg(before);if(rawT>0.1){const zt=easeMid(Math.max(0,(rawT-0.1)/0.9));ctx.save();ctx.globalAlpha=Math.min(1,zt*2);ctx.translate(W/2,H/2);ctx.scale(1+zt*0.4,1+zt*0.4);ctx.translate(-W/2,-H/2);dImg(after);ctx.restore()}}
    if(t>0.7){ctx.globalAlpha=(t-0.7)/0.3;label("After","#10b981");ctx.globalAlpha=1}
  }
  // Optional title + subline, drawn within the safe zone near the top
  if(title){
    const fs=Math.round(sz.w*0.075);
    ctx.font=`800 ${fs}px ${fam}`;ctx.fillStyle=fontColor||"#ffffff";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.shadowColor="rgba(0,0,0,0.5)";ctx.shadowBlur=10;
    ctx.fillText(title,sz.x+sz.w*0.5,sz.y+sz.h*0.1);
    ctx.shadowBlur=0;
    ctx.textAlign="left";ctx.textBaseline="alphabetic";
  }
  if(subline){
    const fs2=Math.round(sz.w*0.04);
    ctx.font=`500 ${fs2}px ${fam}`;ctx.fillStyle=fontColor||"rgba(255,255,255,0.85)";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.shadowColor="rgba(0,0,0,0.5)";ctx.shadowBlur=8;
    ctx.fillText(subline,sz.x+sz.w*0.5,sz.y+sz.h*(title?0.17:0.1));
    ctx.shadowBlur=0;
    ctx.textAlign="left";ctx.textBaseline="alphabetic";
  }
}

function RevealApp(){
  const[before,setBefore]=useState(null);const[after,setAfter]=useState(null);const[style,setStyle]=useState("swipe");const[playing,setPlaying]=useState(true);
  const[audio,setAudio]=useState(null);
  const[revFont,setRevFont]=useState("Inter");const[revColor,setRevColor]=useState("#ffffff");
  const[loops,setLoops]=useState(1);
  const[showTitle,setShowTitle]=useState(false);const[revTitle,setRevTitle]=useState("Before & After");
  const[showSubline,setShowSubline]=useState(false);const[revSubline,setRevSubline]=useState("See the difference");
  const bRef=useRef(null);const aRef=useRef(null);const prevRef=useRef(null);const animRef=useRef(null);const startRef=useRef(null);
  useEffect(()=>{if(before)loadImg(before).then(i=>bRef.current=i)},[before]);
  useEffect(()=>{if(after)loadImg(after).then(i=>aRef.current=i)},[after]);
  const titleArg=showTitle?revTitle:"";
  const sublineArg=showSubline?revSubline:"";
  const totalFrames=REVEAL_LOOP_FRAMES*loops;
  const drawPrev=useCallback(f=>{if(prevRef.current)drawReveal(prevRef.current,bRef.current,aRef.current,style,f%totalFrames,revFont,revColor,titleArg,sublineArg)},[style,revFont,revColor,titleArg,sublineArg,totalFrames]);
  const renderFn=useCallback((canvas,f)=>drawReveal(canvas,bRef.current,aRef.current,style,f,revFont,revColor,titleArg,sublineArg),[style,revFont,revColor,titleArg,sublineArg]);
  const{run,download,prog,exporting,blob,setBlob}=useExport(renderFn,totalFrames,`reveal-${style}.webm`);

function drawDrop(canvas,imgEl,orig,sale,headline,style,frame,fontFam,fontColor){

  const fam=ff(fontFam||"Inter");

  if(imgEl){const ih=H*0.5;const s=Math.max(W/imgEl.width,ih/imgEl.height);const sw=imgEl.width*s,sh=imgEl.height*s;ctx.drawImage(imgEl,(W-sw)/2,0,sw,sh);const g=ctx.createLinearGradient(0,ih*0.4,0,ih);g.addColorStop(0,"transparent");g.addColorStop(1,p.bg);ctx.fillStyle=g;ctx.fillRect(0,0,W,ih+10)}
  const ts_=imgEl?H*0.52:H*0.2,px=W*0.08;let y=ts_;
  const eased=easeOut(Math.min(1,t*4));
  if(headline){ctx.font=`700 ${Math.round(W*0.042)}px ${fam}`;ctx.fillStyle=fontColor||p.txt;ctx.globalAlpha=eased;ctx.fillText(headline,px,y+(1-eased)*18);ctx.globalAlpha=1;y+=Math.round(W*0.042)*1.8}
  const disc=orig&&sale?Math.round((1-Number(sale)/Number(orig))*100):null;
  if(disc&&disc>0){const badgeA=easeOut(Math.min(1,Math.max(0,(t-0.1)*5)));ctx.globalAlpha=badgeA;const bh=Math.round(H*0.065),bw=Math.round(W*0.38);ctx.fillStyle=p.acc;ctx.beginPath();ctx.roundRect(px,y,bw,bh,bh/2);ctx.fill();ctx.font=`900 ${Math.round(bh*0.55)}px ${fam}`;ctx.fillStyle=style==="bold"?p.bg:"#fff";ctx.textAlign="center";ctx.fillText(`${disc}% OFF`,px+bw/2,y+bh*0.69);ctx.textAlign="left";ctx.globalAlpha=1;y+=bh+H*0.04}
  const priceA=easeOut(Math.min(1,Math.max(0,(t-0.2)*4)));ctx.globalAlpha=priceA;
  if(orig){const os=Math.round(W*0.052);ctx.font=`500 ${os}px ${fam}`;ctx.fillStyle=fontColor||p.txt;ctx.globalAlpha=priceA*0.35;ctx.fillText(`$${orig}`,px,y);const ow=ctx.measureText(`$${orig}`).width;ctx.strokeStyle=fontColor||p.txt;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px,y-os*0.3);ctx.lineTo(px+ow,y-os*0.3);ctx.stroke();ctx.globalAlpha=1;y+=os*1.6}
  if(sale){const ss=Math.round(W*0.13);const bp=bounceOut(Math.min(1,Math.max(0,(t-0.25)/0.4)));ctx.globalAlpha=Math.min(1,bp*3);ctx.save();ctx.translate(px,y);ctx.scale(0.7+0.3*bp,0.7+0.3*bp);ctx.font=`900 ${ss}px ${fam}`;ctx.fillStyle=p.acc;ctx.fillText(`$${sale}`,0,0);ctx.restore();ctx.globalAlpha=1;y+=ss*1.3}
  const stripA=easeOut(Math.min(1,Math.max(0,(t-0.6)*5)));
  if(stripA>0){ctx.globalAlpha=stripA;const sy=H*0.86,sh2=H*0.09;ctx.fillStyle=p.acc;ctx.fillRect(0,sy,W,sh2);ctx.font=`900 ${Math.round(sh2*0.42)}px ${fam}`;ctx.fillStyle=style==="bold"?p.bg:"#fff";ctx.textAlign="center";ctx.fillText(style==="urgency"?"⚡ LIMITED TIME OFFER":style==="bold"?"SHOP NOW →":"ORDER TODAY",W/2,sy+sh2*0.65);ctx.textAlign="left";ctx.globalAlpha=1}
}

function drawFlickDemo(canvas,t){
  const ctx=canvas.getContext("2d");const W=canvas.width,H=canvas.height;
  // Cycle through plant backgrounds every 250ms — same as the app (BG_MS=250)
  const n=_demoBgImgs.length;
  const bgIdx=n>0?Math.floor(t/250)%n:0;
  const bg=n>0?_demoBgImgs[bgIdx]:null;
  ctx.clearRect(0,0,W,H);
  if(bg&&bg.complete&&bg.naturalWidth){
    const s=Math.max(W/bg.naturalWidth,H/bg.naturalHeight);
    const sw=bg.naturalWidth*s,sh=bg.naturalHeight*s;
    ctx.drawImage(bg,(W-sw)/2,(H-sh)/2,sw,sh);
  } else {
    ctx.fillStyle="#0a2a12";ctx.fillRect(0,0,W,H);
  }
  // Dark overlay
  ctx.globalAlpha=0.3;ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  // Botanica wordmark
  if(_demoLogoImg.complete&&_demoLogoImg.naturalWidth){
    const lw=W*0.78,lh=lw*(260/1200);
    const lx=(W-lw)/2,ly=H*0.42-lh/2;
    ctx.drawImage(_demoLogoImg,lx,ly,lw,lh);
  }
  // Subline
  const fs=Math.round(W*0.055);
  ctx.font=`400 ${fs}px 'Cormorant Garamond',Georgia,serif`;
  ctx.fillStyle="rgba(241,233,214,0.78)";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText("Grown with intention.",W/2,H*0.58);
  ctx.textAlign="left";ctx.textBaseline="alphabetic";
}

function drawProofDemo(canvas,elapsed){

  const ri=Math.floor(elapsed/CYCLE)%reviews.length;const rev=reviews[ri];
  const fadeIn=Math.min(1,t*5),fadeOut=t>0.8?Math.max(0,1-(t-0.8)/0.2):1;const alpha=Math.min(fadeIn,fadeOut);
  ctx.fillStyle="#0a0a0f";ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=0.06;ctx.fillStyle="#fff";ctx.font=`900 ${Math.round(W*0.28)}px Georgia,serif`;ctx.textAlign="center";ctx.fillText('"',W/2,H*0.38);ctx.textAlign="left";ctx.globalAlpha=alpha;
  const words=rev.q.split(" ");const fs=Math.round(W*0.065);const lh=fs*1.5;
  ctx.textBaseline="top";const renderLine=(txt,ly)=>{let lx=W*0.1;txt.split(" ").forEach(w=>{const clean=w.replace(/\*\*/g,"");const isH=rev.q.indexOf(`**${clean}**`)>-1;const ww=ctx.measureText(clean+" ").width;if(isH){ctx.fillStyle="#fbbf24";ctx.fillRect(lx-2,ly-2,ww+2,fs+4);ctx.fillStyle="#111"}else ctx.fillStyle="rgba(240,240,248,0.95)";ctx.fillText(clean+" ",lx,ly);lx+=ww})};
  ctx.font=`700 ${fs}px Inter,system-ui,sans-serif`;let lines=[],cur="";words.forEach(w=>{const clean=w.replace(/\*\*/g,"");const t2=cur?cur+" "+clean:clean;if(ctx.measureText(t2).width>W*0.8&&cur){lines.push(cur);cur=clean}else cur=t2});if(cur)lines.push(cur);
  lines.forEach((l,i)=>renderLine(l,H*0.32+i*lh));let y=H*0.32+lines.length*lh+lh*0.8;
  ctx.fillStyle="#fbbf24";ctx.font=`${Math.round(W*0.06)}px Arial`;ctx.fillText("★★★★★",W*0.1,y);y+=lh;
  ctx.fillStyle="rgba(200,200,220,0.9)";ctx.font=`600 ${Math.round(W*0.055)}px Inter,system-ui,sans-serif`;ctx.fillText(`— ${rev.a}`,W*0.1,y);
  ctx.textBaseline="alphabetic";ctx.globalAlpha=1;
}

  ctx.globalAlpha=0.4;ctx.fillStyle="#334155";const bw=W*0.35,bh=H*0.22,bx=(W-bw)/2,by=H*0.15;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.fill();
  ctx.globalAlpha=0.7;ctx.font=`${Math.round(W*0.1)}px Arial`;ctx.textAlign="center";ctx.fillText("📦",W/2,by+bh*0.72);ctx.textAlign="left";ctx.globalAlpha=1;
  const fs=Math.round(W*0.078);ctx.globalAlpha=eased;ctx.fillStyle="#f59e0b";ctx.font=`700 ${fs}px Inter,system-ui,sans-serif`;

function drawRevealDemo(canvas,elapsed){
  const ctx=canvas.getContext("2d");const W=canvas.width,H=canvas.height;
  const CYCLE=3200;const t=(elapsed%CYCLE)/CYCLE;const HOLD=0.25;
  const drawBefore=()=>{ctx.fillStyle="#1a1a2a";ctx.fillRect(0,0,W,H);const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.6);g.addColorStop(0,"#2d2d44");g.addColorStop(1,"#0a0a14");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.globalAlpha=0.3;ctx.fillStyle="#4a4a6a";ctx.beginPath();ctx.arc(W/2,H*0.42,W*0.28,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1};
  const drawAfter=()=>{ctx.fillStyle="#0a1a0a";ctx.fillRect(0,0,W,H);const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.6);g.addColorStop(0,"#1a4a1a");g.addColorStop(1,"#050f05");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.globalAlpha=0.5;ctx.fillStyle="#22c55e";ctx.beginPath();ctx.arc(W/2,H*0.42,W*0.28,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1};
  const label=(txt,col)=>{ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,H-H*0.12,W,H*0.12);ctx.fillStyle=col;ctx.font=`700 ${Math.round(W*0.08)}px Inter,system-ui,sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(txt,W/2,H-H*0.06);ctx.textAlign="left";ctx.textBaseline="alphabetic"};
  if(t<HOLD){drawBefore();label("Before","rgba(255,255,255,0.9)");return}
  const raw=Math.min(1,(t-HOLD)/(1-HOLD*2));const ease=raw<0.5?4*raw*raw*raw:1-Math.pow(-2*raw+2,3)/2;
  drawAfter();ctx.save();ctx.beginPath();ctx.rect(0,0,W*(1-ease),H);ctx.clip();drawBefore();ctx.restore();
  const lx=W*(1-ease);ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.strokeStyle="rgba(255,255,255,0.9)";ctx.lineWidth=Math.max(2,W*0.006);ctx.stroke();
  if(ease>0.7){ctx.globalAlpha=(ease-0.7)/0.3;label("After","#10b981");ctx.globalAlpha=1}
}

function drawDropDemo(canvas,elapsed){

  const CYCLE=4000;const t=(elapsed%CYCLE)/CYCLE;
  ctx.fillStyle="#0a0a0f";ctx.fillRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,0,H*0.5);g.addColorStop(0,"#1a0a0a");g.addColorStop(1,"#0a0a0f");ctx.fillStyle=g;ctx.fillRect(0,0,W,H*0.5);
  ctx.globalAlpha=0.5;ctx.font=`${Math.round(W*0.14)}px Arial`;ctx.textAlign="center";ctx.fillText("🔥",W/2,H*0.3);ctx.textAlign="left";ctx.globalAlpha=1;
  const px=W*0.1;let y=H*0.5;
  const ea=easeOut(Math.min(1,t*5));ctx.globalAlpha=ea;ctx.fillStyle="rgba(240,240,248,0.9)";ctx.font=`700 ${Math.round(W*0.065)}px Inter,system-ui,sans-serif`;ctx.fillText("Limited Time Deal",px,y+(1-ea)*16);y+=Math.round(W*0.065)*1.9;
  if(t>0.15){const bA=easeOut(Math.min(1,(t-0.15)*5));ctx.globalAlpha=bA;const bh=Math.round(H*0.07),bw=W*0.55;ctx.fillStyle="#ef4444";ctx.beginPath();ctx.roundRect(px,y,bw,bh,bh/2);ctx.fill();ctx.fillStyle="#fff";ctx.font=`900 ${Math.round(bh*0.52)}px Inter,system-ui,sans-serif`;ctx.textAlign="center";ctx.fillText("50% OFF",px+bw/2,y+bh*0.68);ctx.textAlign="left";ctx.globalAlpha=1;y+=bh+H*0.04}
  if(t>0.25){const pA=easeOut(Math.min(1,(t-0.25)*4));ctx.globalAlpha=pA*0.35;const os=Math.round(W*0.07);ctx.fillStyle="#f8f8fc";ctx.font=`500 ${os}px Inter,system-ui,sans-serif`;ctx.fillText("$99",px,y);const ow=ctx.measureText("$99").width;ctx.strokeStyle="#f8f8fc";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px,y-os*0.3);ctx.lineTo(px+ow,y-os*0.3);ctx.stroke();ctx.globalAlpha=1;y+=os*1.7}
  if(t>0.32){const bp=bounceOut(Math.min(1,(t-0.32)/0.35));const ss=Math.round(W*0.18);ctx.globalAlpha=Math.min(1,bp*2);ctx.save();ctx.translate(px,y);ctx.scale(0.5+0.5*bp,0.5+0.5*bp);ctx.fillStyle="#ef4444";ctx.font=`900 ${ss}px Inter,system-ui,sans-serif`;ctx.fillText("$49",0,0);ctx.restore();ctx.globalAlpha=1}

}

function DemoCanvas({drawFn}){
  const canvasRef=useRef(null);const animRef=useRef(null);const startRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    let stopped=false;
    const loop=ts=>{
      if(stopped)return;
      if(!startRef.current)startRef.current=ts;
      try{drawFn(canvas,ts-startRef.current)}catch(e){/* skip a bad frame, keep the loop alive */}
      animRef.current=requestAnimationFrame(loop);
    };
    animRef.current=requestAnimationFrame(loop);
    return()=>{stopped=true;if(animRef.current)cancelAnimationFrame(animRef.current)};
  },[drawFn]);
  return <canvas ref={canvasRef} width={270} height={480} style={{width:"100%",height:"100%",display:"block",borderRadius:"inherit"}}/>;
}

// ─── CONTACT FORM ─────────────────────────────────────────────────────────────
function ContactForm({open,onClose}){
  const[form,setForm]=useState({name:"",email:"",company:"",comments:""});
  const[status,setStatus]=useState(null);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const submit=async e=>{
    e.preventDefault();
    setStatus("sending");
    try{
      const res=await fetch("/api/mail",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          name:form.name,
          email:form.email,
          company:form.company,
          comments:form.comments,
        })
      });
      const d=await res.json();
      if(d.success){setStatus("sent")}
      else{setStatus("error")}
    }catch{setStatus("error")}
  };
  const IS={width:"100%",padding:"10px 12px",borderRadius:9,background:"#f5f5fa",border:"1px solid rgba(0,0,0,0.1)",color:"#111118",fontSize:13,outline:"none",fontFamily:"inherit"};
  const LBL={fontSize:10,fontWeight:700,color:"#5b6470",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4,display:"block"};
  const pw=Math.min(380,window.innerWidth);
  return(
    <>
      <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:200,opacity:open?1:0,pointerEvents:open?"all":"none",transition:"opacity 0.3s",backdropFilter:"blur(4px)"}}/>
      <div style={{position:"fixed",top:0,left:0,bottom:0,width:pw,background:"#0f0f1c",borderRight:"1px solid rgba(0,0,0,0.08)",zIndex:201,transform:open?"translateX(0)":"translateX(-100%)",transition:"transform 0.35s cubic-bezier(0.4,0,0.2,1)",display:"flex",flexDirection:"column",boxShadow:"4px 0 40px rgba(0,0,0,0.6)",overflowY:"auto"}}>
        <div style={{padding:"20px 20px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div>
            <div style={{fontSize:16,fontWeight:900,letterSpacing:"-0.3px",color:"#e8e8f2"}}>Advertise with us</div>
            <div style={{fontSize:11,color:"#5b6470",marginTop:2}}>Reach thousands of marketers and founders</div>
          </div>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:99,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(0,0,0,0.1)",color:"#6b7280",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
        </div>
        <div style={{padding:"20px",display:"flex",flexDirection:"column",gap:16,flex:1}}>
          {status==="sent"?(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:"40px 20px",textAlign:"center",flex:1}}>
              <div style={{width:56,height:56,borderRadius:"50%",background:"rgba(52,211,153,0.15)",border:"1px solid rgba(52,211,153,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>✓</div>
              <div style={{fontSize:17,fontWeight:800,color:"#e8e8f2"}}>Message sent!</div>
              <div style={{fontSize:13,color:"#5b6470",lineHeight:1.6}}>Thanks for reaching out. We will get back to you within 24 hours.</div>
              <button onClick={()=>{setStatus(null);setForm({name:"",email:"",company:"",comments:""});onClose()}} style={{marginTop:8,padding:"10px 24px",borderRadius:9,background:"linear-gradient(135deg,#7c3aed,#ec4899)",border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Close</button>
            </div>
          ):(
            <form onSubmit={submit} style={{display:"flex",flexDirection:"column",gap:14}}>
              <div style={{padding:"12px 14px",borderRadius:10,background:"rgba(124,58,237,0.08)",border:"1px solid rgba(124,58,237,0.2)"}}>
                <div style={{fontSize:12,color:"#c4b5fd",lineHeight:1.6}}>Place your brand in front of performance marketers, founders and Shopify brands using Flick Suite every day.</div>
              </div>
              <div><label style={LBL}>Your name *</label><input required value={form.name} onChange={set("name")} placeholder="Jane Smith" style={IS}/></div>
              <div><label style={LBL}>Email address *</label><input required type="email" value={form.email} onChange={set("email")} placeholder="jane@company.com" style={IS}/></div>
              <div><label style={LBL}>Company</label><input value={form.company} onChange={set("company")} placeholder="Acme Inc." style={IS}/></div>
              <div><label style={LBL}>Tell us about your campaign *</label><textarea required value={form.comments} onChange={set("comments")} placeholder="Budget, goals, target audience, timeline..." rows={4} style={{...IS,resize:"vertical",minHeight:100}}/></div>
              
              <button type="submit" disabled={status==="sending"} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:status==="sending"?"rgba(255,255,255,0.05)":"linear-gradient(135deg,#7c3aed,#ec4899)",color:status==="sending"?"#6b7280":"#fff",fontSize:14,fontWeight:800,cursor:status==="sending"?"not-allowed":"pointer",boxShadow:status==="sending"?"none":"0 0 20px rgba(124,58,237,0.28)"}}>
                {status==="sending"?"Sending...":"Send Enquiry →"}
              </button>
              {status==="error"&&<div style={{fontSize:12,color:"#f87171",textAlign:"center",marginBottom:4}}>Something went wrong — please try again or email us directly.</div>}
              <p style={{fontSize:10,color:"#5b6470",textAlign:"center",lineHeight:1.5}}>Or email us at <a href="mailto:stephenkington@googlemail.com" style={{color:"#a78bfa"}}>stephenkington@googlemail.com</a></p>
            </form>
          )}
        </div>
      </div>
    </>
  );
}

        Advertise here →

// ─── GLOBAL TIMELINE BAR ─────────────────────────────────────────────────────
function FlickTimeline(){
  const[state,setState]=useState(null);
  useEffect(()=>{
    const iv=setInterval(()=>{if(window.__flickState)setState({...window.__flickState})},100);
    return()=>clearInterval(iv);
  },[]);
  if(!state)return null;
  const{bgs,curBg,playing,duration,ratio}=state;
  const maxItems=Math.min(bgs.length,40);
  const isD=window.innerWidth>=900;
  const itemW=Math.max(28,Math.min(64,(window.innerWidth*0.7)/Math.max(bgs.length,1)-4));
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"rgba(15,15,20,0.96)",backdropFilter:"blur(12px)",borderTop:"1px solid rgba(255,255,255,0.08)",padding:"8px 16px 10px",display:"flex",alignItems:"center",gap:12}}>
      {isD&&<div style={{flex:1}}/>}
      <span style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.35)",letterSpacing:"0.1em",textTransform:"uppercase",flexShrink:0}}>Timeline</span>
      <div style={{flex:isD?"0 1 auto":1,display:"flex",gap:3,overflowX:"auto",alignItems:"center",padding:"2px 0",justifyContent:isD?"center":"flex-start"}}>
        {bgs.length>0?bgs.slice(0,maxItems).map((s,i)=>(
          <div key={i} style={{position:"relative",width:itemW,height:38,borderRadius:6,overflow:"hidden",flexShrink:0,border:curBg===i&&playing?"2px solid #7c3aed":"2px solid rgba(255,255,255,0.1)",transition:"border-color 0.1s",boxShadow:curBg===i&&playing?"0 0 8px rgba(124,58,237,0.5)":"none"}}>
            <img src={s} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
            {curBg===i&&playing&&<div style={{position:"absolute",inset:0,background:"rgba(124,58,237,0.3)"}}/>}
          </div>
        )):(
          <span style={{fontSize:10,color:"rgba(255,255,255,0.2)"}}>Add backgrounds to see timeline</span>
        )}
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",flexShrink:0,gap:2,flex:isD?1:undefined}}>
        <span style={{fontSize:9,color:"rgba(255,255,255,0.35)",letterSpacing:"0.06em"}}>{ratio?.replace("x",":")} · {duration}s</span>
        {bgs.length>0&&<span style={{fontSize:9,color:"rgba(255,255,255,0.2)"}}>{curBg+1}/{bgs.length}</span>}
      </div>
    </div>
  );
}

// ─── PROOF TIMELINE ──────────────────────────────────────────────────────────
function ProofTimeline(){
  const[state,setState]=useState(null);
  useEffect(()=>{const iv=setInterval(()=>{if(window.__proofState)setState({...window.__proofState})},100);return()=>clearInterval(iv)},[]);
  if(!state)return null;
  const{items,curSlide,playing}=state;
  const isD=window.innerWidth>=900;
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"rgba(15,15,20,0.96)",backdropFilter:"blur(12px)",borderTop:"1px solid rgba(255,255,255,0.08)",padding:"8px 16px 10px",display:"flex",alignItems:"center",gap:12}}>
      {isD&&<div style={{flex:1}}/>}
      <span style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.35)",letterSpacing:"0.1em",textTransform:"uppercase",flexShrink:0}}>Timeline</span>
      <div style={{flex:isD?"0 1 auto":1,display:"flex",gap:3,overflowX:"auto",alignItems:"center",justifyContent:isD?"center":"flex-start"}}>
        {items.length>0?items.map((_,i)=>(
          <div key={i} style={{flexShrink:0,height:38,minWidth:48,borderRadius:6,background:curSlide===i&&playing?"rgba(14,165,233,0.3)":"rgba(255,255,255,0.06)",border:curSlide===i&&playing?"2px solid #0ea5e9":"2px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.1s",padding:"0 8px"}}>
            <span style={{fontSize:9,color:curSlide===i&&playing?"#7dd3fc":"rgba(255,255,255,0.4)",fontWeight:700}}>Slide {i+1}</span>
          </div>
        )):<span style={{fontSize:10,color:"rgba(255,255,255,0.2)"}}>Add testimonials to see timeline</span>}
      </div>
      <span style={{fontSize:9,color:"rgba(255,255,255,0.35)",flexShrink:0,flex:isD?1:undefined,textAlign:"right"}}>{curSlide+1}/{items.length}</span>
    </div>
  );
}

// ─── MINI TIMELINES (Hook / Reveal / Drop) ───────────────────────────────────
function MiniTimeline({stateKey,slots,color}){
  const[state,setState]=useState(null);
  useEffect(()=>{const iv=setInterval(()=>{if(window[stateKey])setState({...window[stateKey]})},100);return()=>clearInterval(iv)},[stateKey]);
  if(!state)return null;
  const isD=window.innerWidth>=900;
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"rgba(15,15,20,0.96)",backdropFilter:"blur(12px)",borderTop:"1px solid rgba(255,255,255,0.08)",padding:"8px 16px 10px",display:"flex",alignItems:"center",gap:12}}>
      {isD&&<div style={{flex:1}}/>}
      <span style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.35)",letterSpacing:"0.1em",textTransform:"uppercase",flexShrink:0}}>Timeline</span>
      <div style={{flex:isD?"0 1 auto":1,display:"flex",gap:3,overflowX:"auto",alignItems:"center",justifyContent:isD?"center":"flex-start"}}>
        {slots(state).map((slot,i)=>(
          <div key={i} style={{flexShrink:0,height:38,minWidth:52,borderRadius:6,background:slot.active?"rgba("+color+",0.25)":"rgba(255,255,255,0.06)",border:slot.active?"2px solid rgba("+color+",1)":"2px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 8px",transition:"all 0.1s"}}>
            <span style={{fontSize:9,color:slot.active?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.4)",fontWeight:700}}>{slot.label}</span>
          </div>
        ))}
      </div>
      {isD&&<div style={{flex:1}}/>}
    </div>
  );
}
function HookTimeline(){return<MiniTimeline stateKey="__hookState" color="245,158,11" slots={s=>s.active.map((_,i)=>({label:`Hook ${i+1}`,active:s.actH===i&&s.playing}))}/>}
function RevealTimeline(){return<MiniTimeline stateKey="__revealState" color="16,185,129" slots={s=>[{label:"Before",active:!s.playing},{label:"→ Reveal",active:s.playing},{label:"After",active:false}]}/>}
function DropTimeline(){return<MiniTimeline stateKey="__dropState" color="239,68,68" slots={s=>[{label:"Intro",active:s.playing},{label:"Price",active:s.playing},{label:"CTA",active:s.playing}]}/>}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function Root(){
  const[activeApp,setActiveApp]=useState(null);
  const[contactOpen,setContactOpen]=useState(false);
  const isWide=window.innerWidth>=900;
  useEffect(()=>{window.__setContact=setContactOpen;return()=>{delete window.__setContact}},[]);
  const activeAppMeta=APPS.find(a=>a.id===activeApp);
  return(
    <div style={{minHeight:"100vh",background:"#fafafa",display:"flex",flexDirection:"column"}}>
      <header style={{position:"sticky",top:0,zIndex:100,height:64,display:"flex",alignItems:"center",padding:isWide?"0 32px":"0 16px",gap:12,background:"#ffffff",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderBottom:"1px solid rgba(0,0,0,0.07)",flexShrink:0,boxShadow:"0 1px 0 rgba(0,0,0,0.04)"}}>
        <button onClick={()=>setActiveApp(null)} style={{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",cursor:"pointer",padding:0,flexShrink:0}}>
          <img src={LOGO_URL} alt="Scrolljack" style={{height:32,width:"auto",display:"block"}}/>
        </button>
        {!activeApp&&isWide&&(
          <nav style={{display:"flex",gap:28,marginLeft:40}}>
            {APPS.map(app=>(
              <button key={app.id} onClick={()=>setActiveApp(app.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,fontWeight:600,color:"#374151",padding:0}}>{app.name}</button>
            ))}
          </nav>
        )}
        <div style={{flex:1}}/>
        {activeApp&&(
          <button onClick={()=>setActiveApp(null)} style={{padding:"6px 16px",borderRadius:99,fontSize:11,fontWeight:600,color:"#374151",background:"rgba(0,0,0,0.05)",border:"1px solid rgba(0,0,0,0.1)",cursor:"pointer",letterSpacing:"0.03em"}}>← Home</button>
        )}
        {!activeApp&&(
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setActiveApp("flick")} style={{padding:"10px 20px",borderRadius:99,fontSize:13,fontWeight:700,color:"#fff",background:"#0a0a0f",border:"none",cursor:"pointer"}}>Start creating</button>
          </div>
        )}
      </header>
      {activeApp&&(
        <div style={{display:"flex",gap:4,padding:"6px 16px",borderBottom:"1px solid rgba(0,0,0,0.06)",background:"#ffffff",overflowX:"auto",flexShrink:0}}>
          {APPS.map(app=>(
            <button key={app.id} onClick={()=>setActiveApp(app.id)} style={{padding:"5px 14px",fontSize:11,fontWeight:700,cursor:"pointer",borderRadius:99,border:"none",background:activeApp===app.id?app.color+"14":"transparent",color:activeApp===app.id?app.color:"#6b7280",transition:"all 0.14s",whiteSpace:"nowrap",flexShrink:0,boxShadow:activeApp===app.id?`0 0 0 1px ${app.color}33`:"none"}}>{app.icon} {app.name}</button>
          ))}
        </div>
      )}
      <div style={{flex:1,overflowY:"auto"}}>
        {!activeApp?<HomePage onSelect={setActiveApp}/>:(
          <div style={{width:"100%",padding:"0"}}>
            {activeApp==="flick"&&<FlickApp/>}
            {activeApp==="proof"&&<ProofApp/>}
            {activeApp==="hook"&&<HookApp/>}
            {activeApp==="reveal"&&<RevealApp/>}
            {activeApp==="drop"&&<DropApp/>}
          </div>
        )}
      </div>
      {/* Global timeline bar — fixed to bottom, only when in an app */}
      {activeApp==="flick"&&<FlickTimeline/>}
      {activeApp==="proof"&&<ProofTimeline/>}
      {activeApp==="hook"&&<HookTimeline/>}
      {activeApp==="reveal"&&<RevealTimeline/>}
      {activeApp==="drop"&&<DropTimeline/>}
      <ContactForm open={contactOpen} onClose={()=>setContactOpen(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
